<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Oche Tracker</title>
  <!-- PWA manifest for installability -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* iOS fixes: disable overscroll and text selection */
    html, body {
      height: 100%;
      overscroll-behavior: none; /* no rubber-band scroll【23†L324-L327】 */
      margin: 0;
    }
    body {
      touch-action: none;     /* no scrolling/pinch-zoom */
      user-select: none;      /* no text selection */
      overflow: hidden;       /* lock viewport (no bounce)【21†L1567-L1570】 */
      background: black;
      color: white;
    }
    /* Remove number input arrows */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input {
      line-height: 1; /* avoid extra spacing around text */
      height: auto;
      outline: none;
    }
    /* Score pop animation */
    .score-pop {
      animation: pop 0.18s ease;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>
  <div id="app" class="h-screen flex flex-col pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]"></div>

  html
        app.innerHTML = `
        <div class="p-6 flex flex-col h-full justify-center items-center text-center">
          <div class="text-xl mb-4">Session Summary</div>
          <div class="space-y-2 text-gray-300">
            <div>${date}</div>
            <div>Bulls: ${bulls}</div>
            <div>Visits: ${visits.length}</div>
            <div>BPV: ${bpv()}</div>
            <div>Blank Rate: ${blankRate()}%</div>
            <div>Hat Tricks: ${hatTricks()}</div>
          </div>
          <button id="restartBtn"
            class="mt-8 bg-white text-black px-6 py-4 rounded-xl text-lg">
            Restart Session
          </button>
        </div>
      `;
</body>
</html>
