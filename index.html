<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Free Oche" />
  <meta name="theme-color" content="#080808" />
  <title>Free Oche</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ─── Tokens ─────────────────────────────────────────────────────────────── */
    :root {
      --accent:      #f97316;
      --accent-dim:  rgba(249,115,22,0.13);
      --accent-glow: rgba(249,115,22,0.35);
    }
    body.mode-cricket {
      --accent:      #a855f7;
      --accent-dim:  rgba(168,85,247,0.13);
      --accent-glow: rgba(168,85,247,0.35);
    }

    /* ─── Zoom prevention ───────────────────────────────────────────────────────── */
    html {
      touch-action: manipulation;
      -ms-touch-action: manipulation;
    }
    * { touch-action: manipulation; }
    input, textarea {
      touch-action: auto;
      font-size: 16px;
    }

    /* ─── Reset / base ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #080808;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    button {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }
    input { font-family: 'Rajdhani', sans-serif; outline: none; }

    /* ─── App shell ──────────────────────────────────────────────────────────── */
    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    /* ─── Settings modal mount ───────────────────────────────────────────────── */
    #settings-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
    }
    #settings-modal.open { pointer-events: all; }

    /* ─── Typography ─────────────────────────────────────────────────────────── */
    .font-label {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .stat-label {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6b6b6b;
    }
    .score-display { font-family: 'Bebas Neue', cursive; }

    /* ─── Animations ─────────────────────────────────────────────────────────── */
    @keyframes viewEnter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .view-enter { animation: viewEnter 0.2s ease-out forwards; }

    @keyframes scorePunch {
      0%   { transform: scale(1);    }
      35%  { transform: scale(1.22); }
      100% { transform: scale(1);    }
    }
    .score-punch { animation: scorePunch 0.16s ease-out forwards; }

    /* ─── Flash classes ──────────────────────────────────────────────────────── */
    .flash-0     { background: #450a0a !important; border-color: #7f1d1d !important; transition: none !important; }
    .flash-1     { background: #052e16 !important; border-color: #14532d !important; transition: none !important; }
    .flash-2     { background: #172554 !important; border-color: #1e40af !important; transition: none !important; }
    .flash-3     { background: var(--accent-dim) !important; border-color: var(--accent) !important; transition: none !important; }
    .flash-c-miss { background: #450a0a !important; border-color: #7f1d1d !important; transition: none !important; }
    .flash-c-hit  { background: var(--accent-dim) !important; border-color: var(--accent) !important; transition: none !important; }

    /* ─── Score hero ─────────────────────────────────────────────────────────── */
    .score-hero {
      font-family: 'Bebas Neue', cursive;
      font-size: 7.5rem;
      line-height: 0.88;
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
      letter-spacing: 0.01em;
    }

    /* ─── Top bar ────────────────────────────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      min-height: 54px;
      flex-shrink: 0;
    }
    .mode-dropdown-pill {
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9999px;
      padding: 8px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mode-dropdown-pill:active { opacity: 0.7; }
    .target-pill {
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9999px;
      padding: 8px 14px;
      font-family: 'Bebas Neue', cursive;
      font-size: 1rem;
      color: #fff;
      letter-spacing: 0.05em;
    }
    .target-pill:active { opacity: 0.7; }
    .mode-popover-backdrop { position: absolute; inset: 0; }
    .mode-popover {
      position: absolute;
      top: 54px;
      left: 16px;
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      overflow: hidden;
      z-index: 10;
      min-width: 180px;
    }
    .mode-popover-item {
      padding: 14px 18px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: #aaa;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
    }
    .mode-popover-item:last-child { border-bottom: none; }
    .mode-popover-item:active { background: rgba(255,255,255,0.05); }
    .mode-popover-active { color: var(--accent); }
    .top-bar-icons { display: flex; gap: 2px; }
    .btn-icon {
      background: transparent;
      border: none;
      color: #555;
      font-size: 1.1rem;
      padding: 8px 10px;
      border-radius: 8px;
      transition: color 0.12s;
    }
    .btn-icon:active { color: var(--accent); }
    .btn-back {
      background: transparent;
      border: none;
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 10px 6px 0;
    }
    .top-bar-title {
      font-size: 0.88rem;
      letter-spacing: 0.14em;
      color: #fff;
    }

    /* ─── Metric band ────────────────────────────────────────────────────────── */
    .metric-band {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 12px;
      flex-shrink: 0;
    }
    .metric-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 72px;
      cursor: pointer;
    }
    .metric-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-width: 72px;
    }
    .metric-label {
      font-size: 0.68rem;
      color: #6b6b6b;
      letter-spacing: 0.1em;
      min-height: 14px;
    }
    .metric-value {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.7rem;
      color: #fff;
      line-height: 1;
    }
    .metric-r-label {
      font-size: 0.68rem;
      color: #6b6b6b;
      letter-spacing: 0.1em;
      text-align: right;
    }
    .metric-r-value {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.7rem;
      color: #fff;
      line-height: 1;
      text-align: right;
    }

    /* ─── Bull grid ──────────────────────────────────────────────────────────── */
    .bull-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 8px;
      padding: 0 8px 8px;
      flex: 1;
      min-height: 0;
    }
    .btn-tap {
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      color: #fff;
      font-family: 'Bebas Neue', cursive;
      font-size: 5rem;
      display: flex;
      align-items: center;
      justify-content: center; q
      -webkit-tap-highlight-color: transparent;
      transition: background 0.08s, border-color 0.08s, transform 0.06s;
    }
    .btn-tap:active {
      transform: scale(0.91);
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    /* ─── Cricket numpad ─────────────────────────────────────────────────────── */
    .cricket-numpad {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 8px 8px;
      min-height: 0;
    }
    .numpad-row {
      display: flex;
      flex: 1;
      gap: 8px;
    }
    .numpad-row-zero { justify-content: stretch; }
    .btn-cricket {
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      color: #fff;
      font-family: 'Bebas Neue', cursive;
      font-size: 2.6rem;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.08s, border-color 0.08s, transform 0.06s;
    }
    .btn-cricket-zero {
      flex: 1;
      max-width: 100%;
      border-radius: 16px;
    }
    .btn-cricket:active {
      transform: scale(0.91);
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .btn-disabled {
      opacity: 0.15;
      pointer-events: none;
    }

    /* ─── Target strip ───────────────────────────────────────────────────────── */
    .target-strip {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 8px 16px;
      gap: 8px;
      flex-shrink: 0;
    }
    .target-strip::-webkit-scrollbar { display: none; }
    .target-item {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.15rem;
      scroll-snap-align: center;
      flex-shrink: 0;
      padding: 6px 18px;
      border-radius: 20px;
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.07);
      color: #6b6b6b;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .target-item.target-active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ─── Action strip ───────────────────────────────────────────────────────── */
    .action-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 20px;
      flex-shrink: 0;
    }
    .action-btn {
      background: none;
      border: none;
      color: #6b6b6b;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
    }
    .action-btn:active { color: #fff; }
    .action-btn-right { flex-direction: row-reverse; }
    .action-btn-dim { opacity: 0.25; pointer-events: none; }
    .btn-secondary {
      flex: 1;
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.1);
      color: #aaa;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 14px;
      padding: 16px;
      transition: background 0.1s;
    }
    .btn-secondary:active { background: #161616; }
    .btn-primary {
      flex: 2;
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 14px;
      padding: 16px;
      transition: opacity 0.1s;
    }
    .btn-primary:active { opacity: 0.8; }

    /* ─── Summary screen ─────────────────────────────────────────────────────── */
    .summary-hero {
      padding: 32px 20px 16px;
      flex-shrink: 0;
    }
    .summary-hero-label {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6b6b6b;
    }
    .summary-hero-val {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(6rem, 25vw, 10rem);
      line-height: 0.88;
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
    }
    .summary-stat-row {
      display: flex;
      gap: 32px;
      padding: 0 20px 12px;
      flex-shrink: 0;
    }
    .summary-stat-col { display: flex; flex-direction: column; }
    .summary-stat-label {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b6b6b;
    }
    .summary-stat-val {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      color: #fff;
      line-height: 1;
    }
    .summary-chart-wrap {
      height: 200px;
      flex-shrink: 0;
      padding: 0 8px;
    }
    .summary-bottom {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    /* ─── Insights screen ────────────────────────────────────────────────────── */
    .insights-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 14px 32px;
      min-height: 0;
    }
    .profile-card {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 20px 18px 16px;
      margin-bottom: 16px;
    }
    .nickname-display {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.2rem;
      color: var(--accent);
      cursor: pointer;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
      line-height: 1;
    }
    .nickname-input {
      background: #161616;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      padding: 4px 12px;
      width: 100%;
      margin-bottom: 10px;
      letter-spacing: 0.03em;
      display: block;
      -webkit-user-select: text;
      user-select: text;
    }
    .profile-stats {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .profile-stat {
      flex: 1;
      background: #161616;
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
    }
    .profile-stat-val {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.35rem;
      color: #fff;
      line-height: 1;
    }
    .profile-stat-label {
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      color: #6b6b6b;
      margin-top: 3px;
    }
    .growth-toggle {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: #555;
      cursor: pointer;
      padding: 6px 0 2px;
    }
    .growth-toggle:active { color: var(--accent); }
    .growth-chart-wrap { padding-top: 10px; }

    /* ─── History tabs + list ────────────────────────────────────────────────── */
    .history-tabs {
      display: flex;
      gap: 8px;
      max-width: 240px;
      margin-bottom: 14px;
    }
    .tab-btn {
      flex: 1;
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      color: #6b6b6b;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px;
      transition: all 0.12s;
    }
    .tab-btn.tab-active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .history-card {
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 16px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .card-meta {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 0.03em;
    }
    .card-actions { display: flex; gap: 4px; }
    .btn-micro, .btn-del {
      background: transparent;
      border: none;
      color: #555;
      font-size: 0.85rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.12s;
    }
    .btn-del:active { color: #ef4444; }
    .btn-micro:active { color: var(--accent); }
    .card-rate {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }
    .card-rate-val {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.3rem;
      color: var(--accent);
      line-height: 1;
    }
    .card-rate-label {
      font-size: 0.7rem;
      color: #6b6b6b;
      letter-spacing: 0.1em;
    }
    .card-summary {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .breakdown-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .bd-miss   { color: #ef4444; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; }
    .bd-single { color: #22c55e; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; }
    .bd-tons   { color: #3b82f6; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; }
    .bd-hats   { color: var(--accent); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; }
    .micro-chart-wrap { padding-top: 10px; }
    .no-history {
      text-align: center;
      color: #6b6b6b;
      padding: 32px 16px;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
    }
    .btn-clear-history {
      width: 100%;
      background: rgba(239,68,68,0.07);
      border: 1px solid rgba(239,68,68,0.18);
      border-radius: 12px;
      color: #ef4444;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px;
      margin-top: 4px;
      transition: opacity 0.12s;
    }
    .btn-clear-history:active { opacity: 0.7; }

    /* ─── Settings modal ─────────────────────────────────────────────────────── */
    .settings-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      opacity: 0;
      transition: opacity 0.28s;
    }
    #settings-modal.open .settings-backdrop { opacity: 1; }
    .settings-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      border-radius: 20px 20px 0 0;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      max-height: 88vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    #settings-modal.open .settings-sheet { transform: translateY(0); }
    .settings-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
    }
    .settings-title { font-size: 0.92rem; letter-spacing: 0.12em; color: #fff; }
    .settings-close {
      background: transparent;
      border: none;
      color: #666;
      font-size: 1.05rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.12s;
    }
    .settings-close:active { color: #fff; }
    .settings-body { padding: 0 22px 16px; }
    .settings-section-title {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: #888;
      margin: 18px 0 8px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .settings-row-text { flex: 1; margin-right: 14px; }
    .settings-label { font-size: 0.88rem; letter-spacing: 0.04em; color: #fff; }
    .settings-sublabel { font-size: 0.72rem; color: #6b6b6b; margin-top: 2px; letter-spacing: 0.02em; }
    .settings-text-input {
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      padding: 7px 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      width: 130px;
      text-align: right;
      -webkit-user-select: text;
      user-select: text;
    }
    .settings-num-input {
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: var(--accent);
      padding: 7px 8px;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.4rem;
      width: 72px;
      text-align: center;
      -webkit-user-select: text;
      user-select: text;
    }
    .settings-text-input:focus, .settings-num-input:focus {
      border-color: var(--accent);
    }
    .backup-action-btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin-bottom: 10px;
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #fff;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-align: left;
      cursor: pointer;
    }
    .backup-action-btn:active { background: #2a2a2a; }

    /* iOS-style toggle */
    .toggle-btn {
      width: 48px;
      height: 28px;
      border-radius: 14px;
      background: #333;
      position: relative;
      border: none;
      transition: background 0.2s;
      flex-shrink: 0;
      padding: 0;
    }
    .toggle-btn.toggle-on { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle-btn.toggle-on .toggle-thumb { transform: translateX(20px); }
  </style>
