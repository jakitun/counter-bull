<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Oche Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html, body {
  height: 100%;
  touch-action: none;
  user-select: none;
  overflow: hidden;
}
</style>
</head>

<body class="bg-black text-white">

<!-- PRACTICE VIEW -->
<div id="practice" class="flex flex-col h-screen p-4">

  <!-- NAV -->
  <div class="flex justify-between text-sm text-gray-400">
    <button id="endSession">End Session</button>
    <button id="goInsights">Insights</button>
  </div>

  <!-- HERO -->
  <div class="flex flex-col items-center justify-center flex-1">
    <div class="text-gray-500 text-sm">Bull / Target</div>
    <div id="hero" class="text-[6rem] font-bold">0 / 50</div>
  </div>

  <!-- SUB METRICS -->
  <div class="flex justify-between text-gray-400 mb-2">
    <div id="visits">Visits 0</div>
    <div id="bpv">BPV 0.00</div>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-2 gap-4 flex-1 pb-[env(safe-area-inset-bottom)]">
    <button class="btn" data-v="0">0</button>
    <button class="btn" data-v="1">1</button>
    <button class="btn" data-v="2">2</button>
    <button class="btn" data-v="3">3</button>
  </div>

</div>

<!-- INSIGHTS VIEW -->
<div id="insights" class="hidden flex flex-col h-screen p-4">
  <div class="text-sm text-gray-400 mb-3">
    <button id="back">Back to Practice</button>
  </div>

  <div id="history" class="flex-1 overflow-y-auto space-y-2"></div>

  <button id="clear" class="mt-4 text-sm text-red-400">Clear History</button>
</div>

<script>
let bulls = 0;
let visits = 0;
let blanks = 0;
let hatTricks = 0;
let taps = [];

let target = parseInt(localStorage.getItem("defaultTarget")) || 50;

let lastTapTime = 0;
const TAP_DELAY = 50; // ghost tap protection

let sessionActive = true;

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

const bullsEl = document.getElementById("bulls");
const visitsEl = document.getElementById("visits");
const bpvEl = document.getElementById("bpv");
const targetInput = document.getElementById("targetInput");
const historyEl = document.getElementById("history");

// CREATE SUMMARY SCREEN (inject if not exists)
let summary = document.getElementById("summary");
if (!summary) {
  summary = document.createElement("div");
  summary.id = "summary";
  summary.className = "hidden fixed inset-0 bg-black flex flex-col items-center justify-center text-center p-6";
  summary.innerHTML = `
    <div class="text-3xl font-bold mb-4">Session Complete</div>
    <div id="summaryText" class="text-lg mb-6"></div>
    <button id="restartBtn" class="bg-white text-black px-6 py-3 rounded">New Session</button>
  `;
  document.body.appendChild(summary);
}

const summaryText = document.getElementById("summaryText");
const restartBtn = document.getElementById("restartBtn");

// INIT TARGET
targetInput.value = target;

// UPDATE UI
function updateUI() {
  bullsEl.innerText = bulls;
  visitsEl.innerText = `Visits ${visits}`;
  const bpv = visits ? (bulls / visits).toFixed(2) : "0.00";
  bpvEl.innerText = `BPV ${bpv}`;
}

// AUDIO
function beep(freq, delay=0, dur=0.05) {
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();

  osc.frequency.value = freq;
  osc.type = "square";
  gain.gain.value = 0.1;

  osc.connect(gain);
  gain.connect(audioContext.destination);

  osc.start(audioContext.currentTime + delay);
  osc.stop(audioContext.currentTime + delay + dur);
}

function playSound(v) {
  if (v === 0) beep(200);
  if (v === 1) beep(300);
  if (v === 2) { beep(400); beep(400, 0.15); }
  if (v === 3) { beep(500); beep(500, 0.10); beep(500, 0.20); }
}

function undoSound() {
  beep(150, 0, 0.1);
}

// FLASH
function flash(btn, v) {
  const map = {
    0: "bg-red-600",
    1: "bg-green-500",
    2: "bg-blue-500",
    3: "bg-purple-500"
  };
  btn.classList.add(map[v]);
  setTimeout(()=>btn.classList.remove(map[v]), 70);
}

// TAP
function handleTap(v, btn) {

  if (!sessionActive) return;

  const now = Date.now();
  if (now - lastTapTime < TAP_DELAY) return;
  lastTapTime = now;

  if (audioContext.state === "suspended") {
    audioContext.resume();
  }

  taps.push(v);

  visits++;
  bulls += v;

  if (v === 0) blanks++;
  if (v === 3) hatTricks++;

  playSound(v);
  flash(btn, v);
  updateUI();

  if (bulls >= target) endSession();
}

// UNDO
document.getElementById("undo").onclick = () => {
  if (!taps.length || !sessionActive) return;

  if (audioContext.state === "suspended") {
    audioContext.resume();
  }

  const last = taps.pop();

  visits--;
  bulls -= last;

  if (last === 0) blanks--;
  if (last === 3) hatTricks--;

  undoSound();
  updateUI();
};

// END SESSION (NOW SHOWS SUMMARY)
function endSession() {
  if (!visits || !sessionActive) return;

  sessionActive = false;

  const bpv = (bulls / visits).toFixed(2);
  const blankRate = ((blanks / visits) * 100).toFixed(1);

  const run = {
    date: new Date().toLocaleString(),
    target,
    visits,
    bulls,
    bpv,
    blankRate,
    hatTricks
  };

  const runs = JSON.parse(localStorage.getItem("oche_sessions") || "[]");
  runs.unshift(run);
  localStorage.setItem("oche_sessions", JSON.stringify(runs.slice(0, 50)));

  renderHistory();

  summaryText.innerHTML = `
    Target ${target}<br><br>
    Bulls ${bulls}<br>
    Visits ${visits}<br>
    BPV ${bpv}<br>
    Blank ${blankRate}%<br>
    3s ${hatTricks}
  `;

  summary.classList.remove("hidden");
}

// RESTART (ONLY WAY BACK)
restartBtn.onclick = () => {
  summary.classList.add("hidden");
  reset();
};

// RESET
function reset() {
  bulls = 0;
  visits = 0;
  blanks = 0;
  hatTricks = 0;
  taps = [];
  sessionActive = true;
  updateUI();
}

// TARGET CHANGE
targetInput.addEventListener("change", () => {
  target = parseInt(targetInput.value) || 50;
  localStorage.setItem("defaultTarget", target);
});

// BUTTONS
document.querySelectorAll(".btn").forEach(btn => {
  btn.className = "border border-white/20 rounded-2xl text-6xl font-bold h-full w-full flex items-center justify-center";

  btn.addEventListener("touchstart", e => {
    e.preventDefault();
    handleTap(parseInt(btn.dataset.v), btn);
  }, { passive: false });
});

// NAV
document.getElementById("goInsights").onclick = () => {
  document.getElementById("practice").classList.add("hidden");
  document.getElementById("insights").classList.remove("hidden");
};

document.getElementById("back").onclick = () => {
  document.getElementById("insights").classList.add("hidden");
  document.getElementById("practice").classList.remove("hidden");
};

document.getElementById("endSession").onclick = endSession;

// HISTORY
function renderHistory() {
  const runs = JSON.parse(localStorage.getItem("oche_sessions") || "[]");

  historyEl.innerHTML = runs.map(r => `
    <div class="border border-white/10 p-3 rounded">
      <div class="text-xs text-gray-500">${r.date}</div>
      <div class="text-sm">Target ${r.target}</div>
      <div class="text-sm">BPV ${r.bpv} • Blank ${r.blankRate}% • 3s ${r.hatTricks}</div>
    </div>
  `).join("");
}

document.getElementById("clear").onclick = () => {
  localStorage.removeItem("oche_sessions");
  renderHistory();
};

updateUI();
renderHistory();

// SW
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
