<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Oche Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html, body { height: 100%; }
</style>
</head>

<body class="bg-black text-white select-none">

<div class="h-full flex flex-col p-4">

  <!-- STATS -->
  <div class="text-center mb-2">
    <div class="text-sm opacity-60">Bulls / Visits / BPV</div>
    <div id="stats" class="text-3xl font-bold">0 / 0 / 0.00</div>
  </div>

  <!-- BEST -->
  <div class="text-center mb-3">
    <div id="best" class="text-sm opacity-50">Best: —</div>
  </div>

  <!-- TARGET -->
  <div class="text-center mb-3">
    <input id="targetInput" type="number" value="50"
      class="bg-gray-900 text-white text-center text-xl w-24 p-2 rounded">
    <div class="text-xs opacity-50 mt-1">Target</div>
  </div>

  <!-- TIMER -->
  <div class="text-center mb-4">
    <div id="timer" class="text-5xl font-bold">0.0s</div>
  </div>

  <!-- CONTROLS -->
  <div class="flex gap-2 mb-4">
    <button id="pauseBtn" class="flex-1 bg-gray-800 py-3 rounded text-lg">Pause</button>
    <button id="stopBtn" class="flex-1 bg-red-700 py-3 rounded text-lg">Stop</button>
  </div>

  <!-- BUTTON GRID -->
  <div class="grid grid-cols-2 gap-4 flex-1">
    <button class="btn" data-value="0">0</button>
    <button class="btn" data-value="1">1</button>
    <button class="btn" data-value="2">2</button>
    <button class="btn" data-value="3">3</button>
  </div>

</div>

<!-- SUMMARY -->
<div id="summary" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center text-center p-6">
  <div class="text-4xl font-bold mb-4">Finished</div>
  <div id="summaryText" class="text-lg mb-6"></div>
  <button onclick="location.reload()" class="bg-white text-black px-6 py-3 rounded text-lg">Restart</button>
</div>

<!-- HISTORY -->
<div class="fixed bottom-0 left-0 right-0 bg-black p-3 text-xs opacity-70 max-h-40 overflow-y-auto">
  <div class="mb-1">History</div>
  <div id="history"></div>
</div>

<script>
let bulls = 0;
let visits = 0;
let startTime = null;
let paused = false;
let pauseStart = 0;
let pausedTime = 0;
let timerInterval;

const statsEl = document.getElementById('stats');
const timerEl = document.getElementById('timer');
const bestEl = document.getElementById('best');
const historyEl = document.getElementById('history');

function updateStats() {
  const bpv = visits ? (bulls / visits).toFixed(2) : "0.00";
  statsEl.innerText = `${bulls} / ${visits} / ${bpv}`;
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 100);
}

function updateTimer() {
  if (paused) return;
  const elapsed = (Date.now() - startTime - pausedTime) / 1000;
  timerEl.innerText = elapsed.toFixed(1) + "s";
}

function stopTimer() {
  clearInterval(timerInterval);
}

function playTick() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.value = 800;
  gain.gain.value = 0.1;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.03);
}

function handleTap(value) {
  if (paused) return;

  if (!startTime) startTimer();

  visits++;
  bulls += value;

  playTick();
  updateStats();

  const target = parseInt(document.getElementById('targetInput').value || 50);

  if (bulls >= target) finish();
}

function finish() {
  stopTimer();

  const time = parseFloat(timerEl.innerText);
  const bpv = (bulls / visits).toFixed(2);

  const run = { bulls, visits, bpv, time, date: new Date().toLocaleTimeString() };

  saveRun(run);
  renderHistory();
  updateBest();

  document.getElementById('summaryText').innerHTML = `
    Bulls: ${bulls}<br>
    Visits: ${visits}<br>
    BPV: ${bpv}<br>
    Time: ${time}s
  `;

  document.getElementById('summary').classList.remove('hidden');
}

function saveRun(run) {
  const runs = JSON.parse(localStorage.getItem('oche_runs') || "[]");
  runs.unshift(run);
  localStorage.setItem('oche_runs', JSON.stringify(runs.slice(0, 20)));
}

function renderHistory() {
  const runs = JSON.parse(localStorage.getItem('oche_runs') || "[]");

  historyEl.innerHTML = runs.map(r =>
    `<div>${r.time}s • ${r.bpv} BPV</div>`
  ).join('');
}

function updateBest() {
  const runs = JSON.parse(localStorage.getItem('oche_runs') || "[]");
  if (!runs.length) return;

  const best = runs.reduce((a,b) => a.time < b.time ? a : b);
  bestEl.innerText = `Best: ${best.time}s`;
}

document.querySelectorAll('.btn').forEach(btn => {
  btn.className = "bg-gray-900 active:bg-white active:text-black text-6xl font-bold rounded-2xl flex items-center justify-center";
  btn.addEventListener('click', () => handleTap(parseInt(btn.dataset.value)));
});

// PAUSE
document.getElementById('pauseBtn').onclick = () => {
  if (!startTime) return;

  paused = !paused;

  if (paused) {
    pauseStart = Date.now();
    pauseBtn.innerText = "Resume";
  } else {
    pausedTime += Date.now() - pauseStart;
    pauseBtn.innerText = "Pause";
  }
};

// STOP
document.getElementById('stopBtn').onclick = () => {
  if (!startTime) return;
  finish();
};

// INIT
updateStats();
renderHistory();
updateBest();

// SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
