<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Oche Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html, body {
  height: 100%;
  touch-action: none;
  user-select: none;
  overflow: hidden;
}
</style>
</head>

<body class="bg-black text-white">

<!-- PRACTICE VIEW -->
<div id="practice" class="flex flex-col h-screen p-4">

  <!-- NAV -->
  <div class="flex justify-between text-sm text-gray-400">
    <button id="endSession">End Session</button>
    <button id="goInsights">Insights</button>
  </div>

  <!-- HERO -->
  <div class="flex flex-col items-center justify-center flex-1">
    <div class="text-gray-500 text-sm">Bull / Target</div>
    <div id="hero" class="text-[6rem] font-bold">0 / 50</div>
  </div>

  <!-- SUB METRICS -->
  <div class="flex justify-between text-gray-400 mb-2">
    <div id="visits">Visits 0</div>
    <div id="bpv">BPV 0.00</div>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-2 gap-4 flex-1 pb-[env(safe-area-inset-bottom)]">
    <button class="btn" data-v="0">0</button>
    <button class="btn" data-v="1">1</button>
    <button class="btn" data-v="2">2</button>
    <button class="btn" data-v="3">3</button>
  </div>

</div>

<!-- INSIGHTS VIEW -->
<div id="insights" class="hidden flex flex-col h-screen p-4">
  <div class="text-sm text-gray-400 mb-3">
    <button id="back">Back to Practice</button>
  </div>

  <div id="history" class="flex-1 overflow-y-auto space-y-2"></div>

  <button id="clear" class="mt-4 text-sm text-red-400">Clear History</button>
</div>

<script>
let bulls = 0;
let visits = 0;
let blanks = 0;
let hatTricks = 0;
let target = 50;

// AUDIO CONTEXT (persistent)
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

const hero = document.getElementById("hero");
const visitsEl = document.getElementById("visits");
const bpvEl = document.getElementById("bpv");
const historyEl = document.getElementById("history");

// UPDATE UI
function updateUI() {
  hero.innerText = `${bulls} / ${target}`;
  visitsEl.innerText = `Visits ${visits}`;
  const bpv = visits ? (bulls / visits).toFixed(2) : "0.00";
  bpvEl.innerText = `BPV ${bpv}`;
}

// AUDIO
function beep(freq, delay=0) {
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();

  osc.frequency.value = freq;
  osc.type = "square";
  gain.gain.value = 0.1;

  osc.connect(gain);
  gain.connect(audioContext.destination);

  osc.start(audioContext.currentTime + delay);
  osc.stop(audioContext.currentTime + delay + 0.04);
}

function playSound(v) {
  if (v === 0) beep(200);
  if (v === 1) beep(300);
  if (v === 2) { beep(400); beep(400, 0.15); }
  if (v === 3) { beep(500); beep(500, 0.10); beep(500, 0.20); }
}

// FLASH
function flash(btn, v) {
  const map = {
    0: "bg-red-600",
    1: "bg-green-500",
    2: "bg-blue-500",
    3: "bg-purple-500"
  };
  btn.classList.add(map[v]);
  setTimeout(()=>btn.classList.remove(map[v]), 70);
}

// TAP
function handleTap(v, btn) {

  // iOS AUDIO FIX
  if (audioContext.state === "suspended") {
    audioContext.resume();
  }

  visits++;
  bulls += v;

  if (v === 0) blanks++;
  if (v === 3) hatTricks++;

  playSound(v);
  flash(btn, v);
  updateUI();

  if (bulls >= target) endSession();
}

// END SESSION
function endSession() {
  if (!visits) return;

  const bpv = (bulls / visits).toFixed(2);
  const blankRate = ((blanks / visits) * 100).toFixed(1);

  const run = {
    date: new Date().toLocaleString(),
    target,
    visits,
    bulls,
    bpv,
    blankRate,
    hatTricks
  };

  const runs = JSON.parse(localStorage.getItem("oche_sessions") || "[]");
  runs.unshift(run);
  localStorage.setItem("oche_sessions", JSON.stringify(runs.slice(0, 50)));

  reset();
  renderHistory();
}

// RESET
function reset() {
  bulls = 0;
  visits = 0;
  blanks = 0;
  hatTricks = 0;
  updateUI();
}

// BUTTON SETUP
document.querySelectorAll(".btn").forEach(btn => {
  btn.className = "border border-white/20 rounded-2xl flex items-center justify-center text-6xl font-bold";

  btn.addEventListener("touchstart", e => {
    e.preventDefault();
    handleTap(parseInt(btn.dataset.v), btn);
  }, { passive: false });
});

// NAV
document.getElementById("goInsights").onclick = () => {
  document.getElementById("practice").classList.add("hidden");
  document.getElementById("insights").classList.remove("hidden");
};

document.getElementById("back").onclick = () => {
  document.getElementById("insights").classList.add("hidden");
  document.getElementById("practice").classList.remove("hidden");
};

document.getElementById("endSession").onclick = endSession;

// HISTORY
function renderHistory() {
  const runs = JSON.parse(localStorage.getItem("oche_sessions") || "[]");

  historyEl.innerHTML = runs.map(r => `
    <div class="border border-white/10 p-3 rounded">
      <div class="text-xs text-gray-500">${r.date}</div>
      <div class="text-sm">Target ${r.target}</div>
      <div class="text-sm">BPV ${r.bpv} • Blank ${r.blankRate}% • 3s ${r.hatTricks}</div>
    </div>
  `).join("");
}

document.getElementById("clear").onclick = () => {
  localStorage.removeItem("oche_sessions");
  renderHistory();
};

updateUI();
renderHistory();

// SW
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
