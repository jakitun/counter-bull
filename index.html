<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Oche Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      height: 100%;
      overscroll-behavior: none;
      margin: 0;
      background: black;
      color: white;
      touch-action: none;
      user-select: none;
      overflow: hidden;
    }
    
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      height: 1.2em; 
      line-height: 1;
      width: 3.5ch;
      outline: none;
      background: transparent;
    }

    .btn-target { transition: background-color 0.15s ease-out; } 
    .flash-0 { background-color: #ef4444 !important; transition: none !important; } 
    .flash-1 { background-color: #22c55e !important; transition: none !important; } 
    .flash-2 { background-color: #3b82f6 !important; transition: none !important; } 
    .flash-3 { background-color: #a855f7 !important; transition: none !important; }

    .scrollable { touch-action: auto; overflow-y: auto; overscroll-behavior: auto; }
  </style>
</head>
<body>
  <div id="app" class="h-full flex flex-col pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]"></div>

  <script>
    // --- AUDIO SYSTEM ---
    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    function beep(freq, delay = 0) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + delay;
      osc.start(t);
      gain.gain.setValueAtTime(1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.stop(t + 0.1);
    }

    function playSound(v) {
      if (v === 0) beep(200);
      if (v === 1) beep(300);
      if (v === 2) { beep(400); beep(400, 0.15); }
      if (v === 3) { beep(500); beep(500, 0.10); beep(500, 0.20); }
    }

    // --- STATE MANAGEMENT ---
    let currentView = 'practice';
    let visits = [];
    let target = parseInt(localStorage.getItem('defaultTarget')) || 50;
    let history = JSON.parse(localStorage.getItem('ocheHistory')) || [];
    let metricMode = parseInt(localStorage.getItem('metricMode')) || 0; 
    let lastTapTime = 0;
    let sessionStartTime = null; 

    // --- METRICS CALCULATIONS ---
    const getTotalBulls = () => visits.reduce((a, b) => a + b, 0);
    const getBPR = () => visits.length ? (getTotalBulls() / visits.length).toFixed(2) : "0.00";
    const getBPD = () => visits.length ? (getTotalBulls() / (visits.length * 3)).toFixed(2) : "0.00";
    const getCount = (val) => visits.filter(v => v === val).length;
    
    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}m ${s}s`;
    };

    // --- UI FAST UPDATER ---
    function updateStats() {
      const scoreEl = document.getElementById('score-display');
      const visitsEl = document.getElementById('visits-display');
      const undoBtn = document.getElementById('undo-btn-container');
      const metricLabelEl = document.getElementById('metric-label');
      const metricValueEl = document.getElementById('metric-value');
      
      if (scoreEl) scoreEl.innerText = getTotalBulls();
      if (visitsEl) visitsEl.innerText = visits.length;
      if (undoBtn) undoBtn.innerHTML = visits.length > 0 ? `<button onclick="undoLast()" class="text-sm underline mb-1 active:text-white">Undo</button>` : '';

      if (metricLabelEl && metricValueEl) {
        if (metricMode === 0) {
          metricLabelEl.innerText = "BPR";
          metricValueEl.innerText = getBPR();
          metricValueEl.className = "text-white text-3xl ml-2 font-bold";
        } else if (metricMode === 1) {
          metricLabelEl.innerText = "BPD";
          metricValueEl.innerText = getBPD();
          metricValueEl.className = "text-white text-3xl ml-2 font-bold";
        } else {
          metricLabelEl.innerText = "";
          metricValueEl.innerText = "—";
          metricValueEl.className = "text-gray-700 text-3xl ml-2 font-bold";
        }
      }
    }

    // --- ACTIONS ---
    window.cycleMetric = () => {
      metricMode = (metricMode + 1) % 3;
      localStorage.setItem('metricMode', metricMode);
      updateStats();
    };

    window.tapButton = (val, btnElement) => {
      const now = Date.now();
      if (now - lastTapTime < 50) return; 
      lastTapTime = now;
      
      if (!sessionStartTime) sessionStartTime = Date.now();

      initAudio();
      playSound(val);

      if (btnElement) {
        btnElement.classList.add(`flash-${val}`);
        setTimeout(() => btnElement.classList.remove(`flash-${val}`), 100);
      }

      visits.push(val);
      updateStats(); 
      
      if (getTotalBulls() >= target) setTimeout(endSession, 150); 
    };

    window.undoLast = () => {
      if (visits.length > 0) {
        initAudio();
        beep(150); 
        visits.pop();
        if (visits.length === 0) sessionStartTime = null; 
        updateStats();
      }
    };

    window.updateTarget = (e) => {
      let val = parseInt(e.target.value);
      if (val > 0) { target = val; localStorage.setItem('defaultTarget', target); }
    };

    window.endSession = () => {
      let durationStr = "0m 0s";
      if (sessionStartTime && visits.length > 0) {
        const seconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        durationStr = formatTime(seconds);
      }

      if (visits.length > 0) {
        const session = {
          date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
          duration: durationStr,
          target, bulls: getTotalBulls(), visits: visits.length, bpr: getBPR(),
          c0: getCount(0), c1: getCount(1), c2: getCount(2), c3: getCount(3),
          rawVisits: [...visits] // SAVING RAW THROWS FOR THE MICRO CHART
        };
        history.unshift(session);
        localStorage.setItem('ocheHistory', JSON.stringify(history));
      }
      
      sessionStartTime = null; 
      currentView = 'summary';
      render();
    };

    window.restartSession = () => {
      visits = [];
      sessionStartTime = null;
      currentView = 'practice';
      render();
    };

    window.toggleInsights = () => {
      currentView = currentView === 'insights' ? 'practice' : 'insights';
      render();
    };

    window.deleteRecord = (index) => {
      if (confirm('Delete this session?')) {
        history.splice(index, 1);
        localStorage.setItem('ocheHistory', JSON.stringify(history));
        render();
      }
    };

    window.clearHistory = () => {
      if (confirm('Clear all history?')) { 
        history = []; localStorage.removeItem('ocheHistory'); render(); 
      }
    };

    // --- CHART SETUP ---
    window.renderInsightsChart = () => {
      const ctx = document.getElementById('bprChart');
      if (!ctx || history.length < 2) return;

      const chronological = [...history].reverse();
      const labels = chronological.map(h => h.date.split(' ')[0]);
      const data = chronological.map(h => parseFloat(h.bpr) || 0);

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            data: data,
            borderColor: '#3b82f6', 
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            borderWidth: 3,
            pointBackgroundColor: '#ffffff',
            pointRadius: 4,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } },
            x: { grid: { display: false }, ticks: { color: '#9ca3af', maxTicksLimit: 5 } }
          }
        }
      });
    };

    window.renderSessionChart = () => {
      const ctx = document.getElementById('sessionChart');
      if (!ctx || visits.length === 0) return;

      const labels = visits.map((_, i) => i + 1);

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            data: visits,
            borderColor: '#a855f7', // Purple for the micro-chart
            backgroundColor: 'rgba(168, 85, 247, 0.1)',
            borderWidth: 2,
            pointBackgroundColor: '#fff',
            pointRadius: 2,
            fill: true,
            tension: 0.3 // Smooth curve to see the warm-up rhythm
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { 
              min: 0, 
              max: 3, 
              ticks: { stepSize: 1, color: '#9ca3af' }, 
              grid: { color: '#1f2937' } 
            },
            x: { 
              grid: { display: false }, 
              ticks: { color: '#9ca3af', maxTicksLimit: 10 } 
            }
          }
        }
      });
    };

    // --- MAIN SCREEN RENDERING ---
    const app = document.getElementById('app');
    
    function render() {
      if (currentView === 'practice') {
        app.innerHTML = `
          <div class="flex justify-between px-6 py-4 text-gray-500 font-medium">
            <button onclick="endSession()" class="active:text-white">End Session</button>
            <button onclick="toggleInsights()" class="active:text-white">Insights</button>
          </div>
          
          <div class="flex-none flex flex-col items-center justify-center py-4">
            <div class="text-gray-500 text-sm mb-1 uppercase tracking-widest">Bull / Target</div>
            <div class="text-[6rem] font-bold leading-none flex items-center justify-center">
              <span id="score-display">${getTotalBulls()}</span>
              <span class="mx-3 text-gray-700">/</span>
              <input type="number" value="${target}" onchange="updateTarget(event)" class="text-center p-0 m-0 text-white" />
            </div>
          </div>
          
          <div class="flex justify-between items-end px-6 pb-4 text-gray-500">
            <div>Visits <span id="visits-display" class="text-white text-3xl ml-2 font-bold">${visits.length}</span></div>
            <div class="flex items-end gap-6">
              <div id="undo-btn-container">${visits.length > 0 ? `<button onclick="undoLast()" class="text-sm underline mb-1 active:text-white">Undo</button>` : ''}</div>
              <div onclick="cycleMetric()" class="cursor-pointer active:opacity-70 flex items-end min-h-[40px]">
                <span id="metric-label" class="text-gray-500 text-sm mb-1">BPR</span> 
                <span id="metric-value" class="text-white text-3xl ml-2 font-bold">0.00</span>
              </div>
            </div>
          </div>
          
          <div class="flex-1 grid grid-cols-2 grid-rows-2 gap-4 px-4 pb-6">
            <button ontouchstart="tapButton(0, this)" class="btn-target border border-white/20 rounded-3xl flex items-center justify-center text-[5rem] font-bold">0</button>
            <button ontouchstart="tapButton(1, this)" class="btn-target border border-white/20 rounded-3xl flex items-center justify-center text-[5rem] font-bold">1</button>
            <button ontouchstart="tapButton(2, this)" class="btn-target border border-white/20 rounded-3xl flex items-center justify-center text-[5rem] font-bold">2</button>
            <button ontouchstart="tapButton(3, this)" class="btn-target border border-white/20 rounded-3xl flex items-center justify-center text-[5rem] font-bold">3</button>
          </div>
        `;
        updateStats();
      } 
      else if (currentView === 'summary') {
        app.innerHTML = `
          <div class="flex-1 scrollable flex flex-col items-center p-8 text-center bg-black">
            <h1 class="text-3xl font-bold mb-4 text-white">Session Summary</h1>
            <div class="text-gray-500 mb-6 font-medium bg-gray-900 px-4 py-2 rounded-full text-sm">⏱️ ${sessionStartTime ? formatTime(Math.floor((Date.now() - sessionStartTime) / 1000)) : history[0]?.duration}</div>
            
            <div class="space-y-3 text-lg text-gray-400 w-full max-w-xs mb-6">
              <div class="flex justify-between border-b border-gray-800 pb-2"><span>Bulls:</span> <span class="text-white font-bold">${getTotalBulls()} / ${target}</span></div>
              <div class="flex justify-between border-b border-gray-800 pb-2"><span>Visits:</span> <span class="text-white font-bold">${visits.length}</span></div>
              <div class="flex justify-between border-b border-gray-800 pb-2"><span>BPR:</span> <span class="text-white font-bold">${getBPR()}</span></div>
              
              <div class="mt-4 pt-4 text-xs uppercase tracking-widest text-gray-600">Breakdown</div>
              <div class="grid grid-cols-4 gap-2 text-center text-sm mt-2">
                <div class="bg-gray-900 rounded py-2"><div class="text-gray-500 text-[10px]">0s</div><div class="text-red-400 font-bold">${getCount(0)}</div></div>
                <div class="bg-gray-900 rounded py-2"><div class="text-gray-500 text-[10px]">1s</div><div class="text-green-400 font-bold">${getCount(1)}</div></div>
                <div class="bg-gray-900 rounded py-2"><div class="text-gray-500 text-[10px]">2s</div><div class="text-blue-400 font-bold">${getCount(2)}</div></div>
                <div class="bg-gray-900 rounded py-2"><div class="text-gray-500 text-[10px]">3s</div><div class="text-purple-400 font-bold">${getCount(3)}</div></div>
              </div>
            </div>

            <div class="w-full max-w-xs h-32 mb-8">
              <canvas id="sessionChart"></canvas>
            </div>

            <button onclick="restartSession()" class="w-full max-w-xs bg-white text-black font-bold py-4 rounded-2xl text-xl active:bg-gray-300 transition-colors">Restart Practice</button>
          </div>
        `;
        setTimeout(window.renderSessionChart, 0);
      } 
      else if (currentView === 'insights') {
        app.innerHTML = `
          <div class="flex justify-between items-center px-6 py-5 bg-black z-10">
            <button onclick="toggleInsights()" class="text-blue-500 font-medium text-lg active:text-blue-400">&larr; Back</button>
            <span class="font-bold text-xl text-white">Insights</span>
            <div class="w-12"></div>
          </div>
          
          <div class="flex-1 scrollable bg-black">
            <div class="px-4 py-2 mb-4 border-b border-gray-800">
              ${history.length > 1 
                ? '<div class="h-48 w-full"><canvas id="bprChart"></canvas></div>' 
                : '<div class="h-32 flex items-center justify-center text-gray-600 text-sm">Need at least 2 sessions to show trend graph.</div>'}
            </div>

            <div class="px-4 pb-10 space-y-4">
              ${history.length === 0 ? '<div class="text-center text-gray-500 mt-8 text-lg">No sessions recorded yet.</div>' :
                history.map((h, index) => `
                  <div class="bg-gray-900 rounded-2xl p-5 border border-gray-800 relative">
                    <div class="flex justify-between items-start mb-3 border-b border-gray-800 pb-3">
                      <div class="text-sm text-gray-400">${h.date} &nbsp;·&nbsp; ⏱️ ${h.duration || '-'}</div>
                      <button onclick="deleteRecord(${index})" class="text-red-900 font-bold active:text-red-500 text-sm px-3 py-1 bg-gray-950 rounded">X</button>
                    </div>
                    <div class="flex justify-between items-center mb-4">
                      <div>
                        <div class="text-4xl font-bold text-white">${h.bpr || '0.00'} <span class="text-sm font-normal text-gray-500">BPR</span></div>
                        <div class="text-sm text-gray-400 mt-1">${h.bulls}/${h.target} Bulls in ${h.visits} visits</div>
                      </div>
                    </div>
                    <div class="flex justify-between text-center text-sm border-t border-gray-800 pt-3">
                      <div><span class="text-gray-500 text-xs block">0s</span> <span class="text-red-400 font-medium">${h.c0 !== undefined ? h.c0 : '-'}</span></div>
                      <div><span class="text-gray-500 text-xs block">1s</span> <span class="text-green-400 font-medium">${h.c1 !== undefined ? h.c1 : '-'}</span></div>
                      <div><span class="text-gray-500 text-xs block">2s</span> <span class="text-blue-400 font-medium">${h.c2 !== undefined ? h.c2 : '-'}</span></div>
                      <div><span class="text-gray-500 text-xs block">3s</span> <span class="text-purple-400 font-medium">${h.c3 !== undefined ? h.c3 : '-'}</span></div>
                    </div>
                  </div>
                `).join('')
              }
              ${history.length > 0 ? `<button onclick="clearHistory()" class="w-full mt-8 py-4 text-red-500 font-medium text-lg active:text-red-400">Clear All History</button>` : ''}
            </div>
          </div>
        `;
        setTimeout(window.renderInsightsChart, 0);
      }
    }

    render();
  </script>
</body>
</html>
