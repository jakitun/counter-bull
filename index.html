<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Oche Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html, body {
  height: 100%;
  touch-action: none;
  user-select: none;
  overflow: hidden;
}
</style>
</head>

<body class="bg-black text-white">

<div id="app" class="h-full flex flex-col p-4">

  <!-- TOP BAR -->
  <div class="flex justify-between items-center mb-3">
    <div class="text-lg font-bold">Practice</div>
    <button id="toggleView" class="text-xs opacity-60">Insights</button>
  </div>

  <!-- STATS -->
  <div class="text-center mb-4">
    <div class="text-sm opacity-60">Target</div>
    <div id="targetDisplay" class="text-2xl mb-2">50</div>

    <div class="text-sm opacity-60">Visits / BPV</div>
    <div id="stats" class="text-3xl font-bold">0 / 0.00</div>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-2 gap-4 flex-1">
    <button class="btn" data-value="0">0</button>
    <button class="btn" data-value="1">1</button>
    <button class="btn" data-value="2">2</button>
    <button class="btn" data-value="3">3</button>
  </div>

</div>

<!-- INSIGHTS VIEW -->
<div id="insights" class="hidden fixed inset-0 bg-black p-4 overflow-y-auto">
  <div class="flex justify-between mb-4">
    <div class="text-lg font-bold">Insights</div>
    <button id="backBtn" class="text-xs opacity-60">Back</button>
  </div>

  <div id="history" class="space-y-2 text-sm"></div>
</div>

<!-- SUMMARY -->
<div id="summary" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center text-center p-6">
  <div class="text-3xl font-bold mb-4">Session Complete</div>
  <div id="summaryText" class="text-lg mb-6"></div>
  <button onclick="location.reload()" class="bg-white text-black px-6 py-3 rounded">Restart</button>
</div>

<script>
let bulls = 0;
let visits = 0;
let blanks = 0;
let hatTricks = 0;
let target = 50;

const statsEl = document.getElementById('stats');
const summary = document.getElementById('summary');
const summaryText = document.getElementById('summaryText');
const historyEl = document.getElementById('history');

function updateStats() {
  const bpv = visits ? (bulls / visits).toFixed(2) : "0.00";
  statsEl.innerText = `${visits} / ${bpv}`;
}

function playSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  function beep(freq, delay=0) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = freq;
    osc.type = "square";
    gain.gain.value = 0.1;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + 0.04);
  }

  if (type === 0) beep(200);
  if (type === 1) beep(800);
  if (type === 2) { beep(800); beep(800, 0.06); }
  if (type === 3) { beep(800); beep(800, 0.05); beep(800, 0.1); }
}

function flash(btn, value) {
  const colors = {
    0: "bg-red-600",
    1: "bg-green-500",
    2: "bg-blue-500",
    3: "bg-purple-500"
  };

  btn.classList.add(colors[value]);
  setTimeout(() => btn.classList.remove(colors[value]), 80);
}

function handleTap(value, btn) {
  visits++;
  bulls += value;

  if (value === 0) blanks++;
  if (value === 3) hatTricks++;

  playSound(value);
  flash(btn, value);

  updateStats();

  if (bulls >= target) finish();
}

function finish() {
  const bpv = (bulls / visits).toFixed(2);
  const blankRate = ((blanks / visits) * 100).toFixed(1);

  const run = {
    date: new Date().toLocaleString(),
    bpv,
    blankRate,
    hatTricks
  };

  const runs = JSON.parse(localStorage.getItem("oche_v2") || "[]");
  runs.unshift(run);
  localStorage.setItem("oche_v2", JSON.stringify(runs.slice(0, 50)));

  renderHistory();

  summaryText.innerHTML = `
    BPV: ${bpv}<br>
    Blank Rate: ${blankRate}%<br>
    Hat Tricks: ${hatTricks}
  `;

  summary.classList.remove("hidden");
}

function renderHistory() {
  const runs = JSON.parse(localStorage.getItem("oche_v2") || "[]");

  historyEl.innerHTML = runs.map(r => `
    <div class="border border-gray-800 p-2 rounded">
      <div>${r.date}</div>
      <div>BPV: ${r.bpv} • Blank: ${r.blankRate}% • 3s: ${r.hatTricks}</div>
    </div>
  `).join("");
}

document.querySelectorAll('.btn').forEach(btn => {
  btn.className = "bg-black border border-white text-6xl font-bold rounded-2xl flex items-center justify-center active:scale-95";

  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleTap(parseInt(btn.dataset.value), btn);
  }, { passive: false });
});

// VIEW TOGGLE
document.getElementById('toggleView').onclick = () => {
  document.getElementById('app').classList.add('hidden');
  document.getElementById('insights').classList.remove('hidden');
};

document.getElementById('backBtn').onclick = () => {
  document.getElementById('insights').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
};

updateStats();
renderHistory();

// SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
