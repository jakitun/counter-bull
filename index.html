<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Oche Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --accent:      #f97316;
      --accent-dim:  rgba(249,115,22,0.13);
      --accent-glow: rgba(249,115,22,0.35);
    }
    body.mode-cricket {
      --accent:      #a855f7;
      --accent-dim:  rgba(168,85,247,0.13);
      --accent-glow: rgba(168,85,247,0.35);
    }

    html, body {
      height: 100%; overscroll-behavior: none; margin: 0;
      background: #080808; color: white;
      touch-action: none; user-select: none; overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] {
      height: 1.2em; line-height: 1; width: 3ch; outline: none;
      background: transparent; font-family: 'Bebas Neue', sans-serif;
      color: var(--accent);
    }

    .score-display { font-family: 'Bebas Neue', sans-serif; }
    .score-hero {
      font-family: 'Bebas Neue', sans-serif; color: var(--accent);
      text-shadow: 0 0 48px var(--accent-glow);
      transition: color 0.4s ease, text-shadow 0.4s ease;
      display: inline-block;
    }
    .stat-label {
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: #6b6b6b;
    }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; line-height: 1; color: white; }
    .font-label { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .accent-text { color: var(--accent); transition: color 0.4s ease; }
    .stat-divider { border-color: rgba(255,255,255,0.05); }

    @keyframes score-punch {
      0%  { transform: scale(1); }
      35% { transform: scale(1.22); }
      100%{ transform: scale(1); }
    }
    .score-punch { animation: score-punch 0.22s cubic-bezier(0.36,0.07,0.19,0.97) both; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .view-enter { animation: fade-up 0.25s ease forwards; }

    /* Bull buttons */
    .btn-tap {
      background: #0f0f0f; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 26px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, border-color 0.12s ease, background 0.12s ease;
      overflow: hidden;
    }
    .btn-tap:active { transform: scale(0.91); border-color: var(--accent); background: var(--accent-dim); }
    .btn-tap:active .btn-num   { color: var(--accent); }
    .btn-tap:active .btn-icons { color: var(--accent); opacity: 1; }
    .btn-num {
      font-family: 'Bebas Neue', sans-serif; font-size: 4.5rem; line-height: 1; color: white;
      transition: color 0.12s ease;
    }
    .btn-icons {
      display: flex; gap: 3px; align-items: center;
      color: rgba(255,255,255,0.18); transition: color 0.12s ease; min-height: 14px;
    }

    /* Cricket numpad */
    .btn-cricket {
      background: #0f0f0f; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: #c9cdd4;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, border-color 0.12s ease, background 0.12s ease, color 0.12s ease;
      overflow: hidden;
    }
    .btn-cricket:active { transform: scale(0.91); border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

    /* Flash classes */
    .btn-target   { transition: background-color 0.15s ease-out; }
    .flash-0      { background-color:#dc2626 !important; border-color:#dc2626 !important; color:#fff !important; transition:none !important; }
    .flash-1      { background-color:#16a34a !important; border-color:#16a34a !important; color:#fff !important; transition:none !important; }
    .flash-2      { background-color:#2563eb !important; border-color:#2563eb !important; color:#fff !important; transition:none !important; }
    .flash-3      { background-color:var(--accent) !important; border-color:var(--accent) !important; color:#000 !important; transition:none !important; }
    .flash-c-miss { background-color:#dc2626 !important; border-color:#dc2626 !important; color:#fff !important; transition:none !important; }
    .flash-c-hit  { background-color:var(--accent) !important; border-color:var(--accent) !important; color:#000 !important; transition:none !important; }

    /* Mode toggle */
    .mode-toggle {
      background: #0f0f0f; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9999px; padding: 4px; display: flex;
    }
    .mode-btn {
      flex: 1; padding: 7px 10px; border-radius: 9999px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 0.7rem; letter-spacing: 0.07em; text-transform: uppercase;
      color: #4b5563; background: transparent; border: none; cursor: pointer;
      transition: background-color 0.35s ease, color 0.35s ease;
      -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    .mode-btn.active { background: var(--accent); color: #000; }

    /* Cricket target pills */
    .target-pills {
      display: flex; gap: 8px; overflow-x: auto; padding: 4px 16px 6px;
      scrollbar-width: none; -ms-overflow-style: none; touch-action: pan-x;
    }
    .target-pills::-webkit-scrollbar { display: none; }
    .target-pill {
      flex-shrink: 0; padding: 5px 14px; border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.1); background: #0f0f0f;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; color: #6b6b6b;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .target-pill.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* Cards */
    .insight-card {
      background: #0f0f0f; border: 1px solid rgba(255,255,255,0.06); border-radius: 22px; padding: 18px;
    }
    .profile-stat {
      background: #161616; border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px; padding: 10px 8px; text-align: center; flex: 1;
    }

    /* Settings modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 100;
      display: flex; align-items: flex-end; padding-bottom: env(safe-area-inset-bottom);
    }
    .modal-sheet {
      width: 100%; background: #111; border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(255,255,255,0.08); padding: 20px 22px 36px;
    }
    .modal-handle { width: 40px; height: 4px; background: #2a2a2a; border-radius: 9999px; margin: 0 auto 18px; }
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .toggle-label { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 1rem; color: #ccc; }
    .toggle-sub   { font-size: 0.68rem; color: #4b4b4b; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
    .ios-toggle   { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
    .ios-toggle input { opacity: 0; width: 0; height: 0; }
    .ios-slider {
      position: absolute; inset: 0; background: #2a2a2a;
      border-radius: 9999px; transition: background 0.25s; cursor: pointer;
    }
    .ios-slider:before {
      content: ''; position: absolute; width: 20px; height: 20px;
      left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.25s;
    }
    .ios-toggle input:checked + .ios-slider            { background: var(--accent); }
    .ios-toggle input:checked + .ios-slider:before     { transform: translateX(20px); }

    /* Backup buttons */
    .backup-btn {
      flex: 1; padding: 9px 6px; border-radius: 12px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 0.72rem; letter-spacing: 0.07em; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.08); background: #161616; color: #888;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .backup-btn:active { background: #1e1e1e; color: white; }

    /* Nickname input */
    .nickname-input {
      background: transparent; border: none; border-bottom: 1px solid var(--accent);
      color: white; font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; outline: none; text-align: center; width: 200px;
    }

    .scrollable { touch-action: auto; overflow-y: auto; overscroll-behavior: auto; }
  </style>
</head>
<body>
  <div id="app" class="h-full flex flex-col pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]"></div>
  <div id="settings-modal" class="modal-overlay hidden"></div>

  <script>
    /* ══════════════════════════════════════════
       SVG ICONS
    ══════════════════════════════════════════ */
    var DART_SVG = '<svg viewBox="0 0 48 20" width="32" height="13" xmlns="http://www.w3.org/2000/svg">'
      + '<polygon points="0,10 8,7 8,13" fill="currentColor"/>'
      + '<rect x="8" y="8.5" width="21" height="3" rx="1.5" fill="currentColor"/>'
      + '<rect x="29" y="9.5" width="7" height="1.5" fill="currentColor" opacity="0.55"/>'
      + '<polygon points="36,5 48,10 36,15 39.5,10" fill="currentColor" opacity="0.4"/>'
      + '</svg>';
    var MISS_SVG = '<svg viewBox="0 0 22 22" width="20" height="20" xmlns="http://www.w3.org/2000/svg">'
      + '<line x1="4" y1="4" x2="18" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>'
      + '<line x1="18" y1="4" x2="4" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>'
      + '</svg>';
    var GEAR_SVG = '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
    var PENCIL_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

    function dartIcons(n) {
      if (n === 0) return MISS_SVG;
      var out = '';
      for (var i = 0; i < n; i++) out += DART_SVG;
      return out;
    }

    /* ══════════════════════════════════════════
       SETTINGS
    ══════════════════════════════════════════ */
    var settings = {
      audio:      JSON.parse(localStorage.getItem('s_audio')   !== null ? localStorage.getItem('s_audio')   : 'true'),
      haptics:    JSON.parse(localStorage.getItem('s_haptics') !== null ? localStorage.getItem('s_haptics') : 'true'),
      zenMode:    JSON.parse(localStorage.getItem('s_zen')     !== null ? localStorage.getItem('s_zen')     : 'false'),
      showRounds: JSON.parse(localStorage.getItem('s_rounds')  !== null ? localStorage.getItem('s_rounds')  : 'true')
    };
    function saveSettings() {
      localStorage.setItem('s_audio',   settings.audio);
      localStorage.setItem('s_haptics', settings.haptics);
      localStorage.setItem('s_zen',     settings.zenMode);
      localStorage.setItem('s_rounds',  settings.showRounds);
    }

    /* ══════════════════════════════════════════
       AUDIO
    ══════════════════════════════════════════ */
    var audioCtx = null;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function beep(freq, delay, duration) {
      if (delay    === undefined) delay    = 0;
      if (duration === undefined) duration = 0.1;
      if (!audioCtx || !settings.audio) return;
      var osc  = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      var t = audioCtx.currentTime + delay;
      osc.start(t);
      gain.gain.setValueAtTime(1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.stop(t + duration);
    }
    function playSound(v) {
      if (v === 0) { beep(200); }
      if (v === 1) { beep(300); }
      if (v === 2) { beep(400); beep(400, 0.15); }
      if (v === 3) { beep(500); beep(500, 0.10); beep(500, 0.20); }
    }
    function playCricketSound(marks) {
      if (marks === 0)        { beep(200); }
      else if (marks <= 3)    { beep(300 + marks * 50); }
      else if (marks <= 6)    { beep(400); beep(500, 0.15); }
      else                    { beep(500); beep(600, 0.10); beep(700, 0.20); }
    }
    function playRewardSound() {
      beep(440, 0.00, 0.12);
      beep(554, 0.15, 0.12);
      beep(659, 0.30, 0.22);
      beep(880, 0.52, 0.35);
    }
    function haptic(ms) {
      if (!ms) ms = 40;
      if (settings.haptics && navigator.vibrate) navigator.vibrate(ms);
    }

    /* ══════════════════════════════════════════
       APP STATE
    ══════════════════════════════════════════ */
    var currentView      = 'practice';
    var appMode          = localStorage.getItem('appMode') || 'bull';
    var lastTapTime      = 0;
    var sessionStartTime = null;
    var nickname         = localStorage.getItem('nickname') || 'Player 1';
    var editingNickname  = false;

    // Bull
    var rounds  = [];
    var target  = parseInt(localStorage.getItem('defaultTarget')) || 50;
    var history = JSON.parse(localStorage.getItem('ocheHistory')) || [];

    // Cricket Target Lock
    var CRICKET_TARGETS    = ['20','19','18','17','16','15','BULL'];
    var CRICKET_MAX_ROUNDS = 10;
    var cricketTarget  = localStorage.getItem('cricketTarget') || '20';
    var cricketRounds  = [];   // plain numbers
    var cricketHistory = JSON.parse(localStorage.getItem('ocheCricketHistory')) || [];

    function formatTime(s) { return Math.floor(s/60) + 'm ' + (s % 60) + 's'; }
    function applyModeClass() { document.body.classList.toggle('mode-cricket', appMode === 'cricket'); }
    applyModeClass();

    /* ══════════════════════════════════════════
       ALL-TIME STATS
    ══════════════════════════════════════════ */
    function getAllTimeBPR() {
      if (!history.length) return '\u2014';
      var bulls = 0, rds = 0;
      for (var i = 0; i < history.length; i++) { bulls += (history[i].bulls || 0); rds += (history[i].rounds || 0); }
      return rds ? (bulls / rds).toFixed(2) : '\u2014';
    }
    function getAllTimeMPR() {
      if (!cricketHistory.length) return '\u2014';
      var marks = 0, rds = 0;
      for (var i = 0; i < cricketHistory.length; i++) { marks += (cricketHistory[i].totalMarks || 0); rds += (cricketHistory[i].rounds || 0); }
      return rds ? (marks / rds).toFixed(2) : '\u2014';
    }
    function getTotalRoundsAll() {
      var b = 0, c = 0;
      for (var i = 0; i < history.length; i++)        b += (history[i].rounds || 0);
      for (var j = 0; j < cricketHistory.length; j++) c += (cricketHistory[j].rounds || 0);
      return b + c;
    }

    /* ══════════════════════════════════════════
       LOGARITHMIC REGRESSION  y = a·ln(x) + b
    ══════════════════════════════════════════ */
    function logRegression(data) {
      var n = data.length;
      if (n < 3) return null;
      var sumLnX = 0, sumY = 0, sumLnXY = 0, sumLnX2 = 0;
      for (var i = 0; i < n; i++) {
        var lnx  = Math.log(i + 1);
        sumLnX  += lnx;
        sumY    += data[i];
        sumLnXY += lnx * data[i];
        sumLnX2 += lnx * lnx;
      }
      var denom = n * sumLnX2 - sumLnX * sumLnX;
      if (denom === 0) return null;
      var a = (n * sumLnXY - sumLnX * sumY) / denom;
      var b = (sumY - a * sumLnX) / n;
      var out = [];
      for (var j = 0; j < n; j++) out.push(parseFloat((a * Math.log(j + 1) + b).toFixed(3)));
      return out;
    }
    function makeTrendDataset(data, hex) {
      var trend = logRegression(data);
      if (!trend) return null;
      return { data: trend, borderColor: hex, backgroundColor: 'transparent',
               borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0,
               fill: false, tension: 0, order: 1 };
    }

    /* ══════════════════════════════════════════
       MODE SWITCH
    ══════════════════════════════════════════ */
    window.switchMode = function(mode) {
      if (rounds.length > 0 || cricketRounds.length > 0) {
        if (!confirm('Switching modes will discard your current session. Continue?')) return;
      }
      appMode = mode;
      localStorage.setItem('appMode', appMode);
      rounds = []; cricketRounds = []; sessionStartTime = null;
      applyModeClass(); render();
    };

    /* ══════════════════════════════════════════
       BULL LOGIC
    ══════════════════════════════════════════ */
    function getTotalBulls() { var s = 0; for (var i=0;i<rounds.length;i++) s+=rounds[i]; return s; }
    function getBPR()        { return rounds.length ? (getTotalBulls()/rounds.length).toFixed(2) : '0.00'; }
    function getCount(v)     { var c=0; for(var i=0;i<rounds.length;i++) if(rounds[i]===v) c++; return c; }

    window.tapBull = function(val, btn) {
      var now = Date.now();
      if (now - lastTapTime < 50) return;
      lastTapTime = now;
      if (!sessionStartTime) sessionStartTime = Date.now();
      initAudio(); playSound(val); haptic(30);
      if (btn) {
        btn.classList.add('flash-' + val);
        setTimeout(function() { btn.classList.remove('flash-' + val); }, 120);
      }
      rounds.push(val);
      updateStats();
      if (getTotalBulls() >= target) setTimeout(window.endSession, 150);
    };

    /* ══════════════════════════════════════════
       CRICKET TARGET LOCK
    ══════════════════════════════════════════ */
    function getTotalMarks() { var s=0; for(var i=0;i<cricketRounds.length;i++) s+=cricketRounds[i]; return s; }
    function getCricketMPR() { return cricketRounds.length ? (getTotalMarks()/cricketRounds.length).toFixed(2) : '0.00'; }

    window.selectCricketTarget = function(t) {
      if (cricketRounds.length > 0) {
        if (!confirm('Changing target will reset the current session. Continue?')) return;
        cricketRounds = []; sessionStartTime = null;
      }
      cricketTarget = t;
      localStorage.setItem('cricketTarget', cricketTarget);
      render();
    };

    window.tapCricket = function(marks, btn) {
      var now = Date.now();
      if (now - lastTapTime < 50) return;
      if (cricketRounds.length >= CRICKET_MAX_ROUNDS) return;
      lastTapTime = now;
      if (!sessionStartTime) sessionStartTime = Date.now();
      initAudio();
      var fc = marks === 0 ? 'flash-c-miss' : 'flash-c-hit';
      if (btn) {
        btn.classList.add(fc);
        setTimeout(function() { btn.classList.remove(fc); }, 140);
      }
      playCricketSound(marks); haptic(30);
      cricketRounds.push(marks);
      updateStats();
      if (cricketRounds.length >= CRICKET_MAX_ROUNDS) setTimeout(window.endSession, 250);
    };

    /* ══════════════════════════════════════════
       SHARED ACTIONS
    ══════════════════════════════════════════ */
    window.undoLast = function() {
      initAudio(); beep(150); haptic(20);
      if (appMode === 'bull' && rounds.length > 0) {
        rounds.pop();
        if (rounds.length === 0) sessionStartTime = null;
        updateStats();
      } else if (appMode === 'cricket' && cricketRounds.length > 0) {
        cricketRounds.pop();
        if (cricketRounds.length === 0) sessionStartTime = null;
        updateStats();
      }
    };

    window.updateTarget = function(e) {
      var v = parseInt(e.target.value);
      if (v > 0) { target = v; localStorage.setItem('defaultTarget', target); }
    };

    window.endSession = function() {
      var dur = '0m 0s';
      var arr = appMode === 'bull' ? rounds : cricketRounds;
      if (sessionStartTime && arr.length > 0)
        dur = formatTime(Math.floor((Date.now() - sessionStartTime) / 1000));
      var d = new Date();
      var dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      if (appMode === 'bull' && rounds.length > 0) {
        history.unshift({ date:dateStr, duration:dur, target:target,
          bulls:getTotalBulls(), rounds:rounds.length, bpr:getBPR(),
          c0:getCount(0), c1:getCount(1), c2:getCount(2), c3:getCount(3),
          rawRounds:rounds.slice() });
        localStorage.setItem('ocheHistory', JSON.stringify(history));
      } else if (appMode === 'cricket' && cricketRounds.length > 0) {
        cricketHistory.unshift({ date:dateStr, duration:dur, target:cricketTarget,
          mpr:getCricketMPR(), rounds:cricketRounds.length,
          totalMarks:getTotalMarks(), rawRounds:cricketRounds.slice() });
        localStorage.setItem('ocheCricketHistory', JSON.stringify(cricketHistory));
      }
      sessionStartTime = null;
      initAudio(); playRewardSound();
      setTimeout(function() { currentView = 'summary'; render(); }, 750);
    };

    window.restartSession = function() {
      rounds = []; cricketRounds = []; sessionStartTime = null;
      currentView = 'practice'; render();
    };
    window.toggleInsights = function() {
      currentView = currentView === 'insights' ? 'practice' : 'insights'; render();
    };
    window.deleteRecord = function(i) {
      if (!confirm('Delete this session?')) return;
      if (appMode === 'bull') { history.splice(i,1); localStorage.setItem('ocheHistory', JSON.stringify(history)); }
      else { cricketHistory.splice(i,1); localStorage.setItem('ocheCricketHistory', JSON.stringify(cricketHistory)); }
      render();
    };
    window.clearHistory = function() {
      if (!confirm('Clear all history for this mode?')) return;
      if (appMode === 'bull') { history = []; localStorage.removeItem('ocheHistory'); }
      else { cricketHistory = []; localStorage.removeItem('ocheCricketHistory'); }
      render();
    };

    /* ══════════════════════════════════════════
       BACKUP
    ══════════════════════════════════════════ */
    window.exportBackup = function() {
      var data = { ocheHistory:history, ocheCricketHistory:cricketHistory,
        nickname:nickname, appMode:appMode, defaultTarget:target,
        cricketTarget:cricketTarget, settings:settings };
      var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'oche-backup-' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
    };
    window.importBackup = function() {
      var inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.json';
      inp.onchange = function(e) {
        var file = e.target.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          try {
            var data = JSON.parse(ev.target.result);
            if (data.ocheHistory)        { history = data.ocheHistory; localStorage.setItem('ocheHistory', JSON.stringify(history)); }
            if (data.ocheCricketHistory) { cricketHistory = data.ocheCricketHistory; localStorage.setItem('ocheCricketHistory', JSON.stringify(cricketHistory)); }
            if (data.nickname)           { nickname = data.nickname; localStorage.setItem('nickname', nickname); }
            if (data.settings)           { for (var k in data.settings) settings[k] = data.settings[k]; saveSettings(); }
            alert('Backup restored!'); render();
          } catch(err) { alert('Invalid backup file.'); }
        };
        reader.readAsText(file);
      };
      inp.click();
    };

    window.openSettings = function() {

        + '<div class="modal-handle"></div>'

    /* ══════════════════════════════════════════
       FAST UPDATER
    ══════════════════════════════════════════ */
    function punchScore() {
      var el = document.getElementById('score-display');
      if (!el) return;
      el.classList.remove('score-punch'); void el.offsetWidth; el.classList.add('score-punch');
    }

    function updateStats() {
      var undoEl   = document.getElementById('undo-btn-container');
      var labelEl  = document.getElementById('metric-label');
      var valueEl  = document.getElementById('metric-value');
      var roundsEl = document.getElementById('rounds-display');
      var wrapEl   = document.getElementById('rounds-wrapper');
      if (wrapEl) wrapEl.style.visibility = settings.showRounds ? 'visible' : 'hidden';

      if (appMode === 'bull') {
        var scoreEl = document.getElementById('score-display');
        if (scoreEl) {
          var prev = scoreEl.innerText;
          scoreEl.innerText = getTotalBulls();
          if (prev !== scoreEl.innerText) punchScore();
        }
        if (roundsEl) roundsEl.innerText = rounds.length;
        if (undoEl)   undoEl.innerHTML   = rounds.length > 0 ? '<button onclick="undoLast()" class="stat-label" style="color:#6b6b6b">Undo</button>' : '';
        if (labelEl && valueEl) {
          if (!settings.zenMode) { labelEl.innerText='BPR'; valueEl.innerText=getBPR(); valueEl.style.color='white'; }
          else                   { labelEl.innerText='';    valueEl.innerText='\u2014'; valueEl.style.color='#222'; }
        }
      } else if (appMode === 'cricket') {
        var progEl  = document.getElementById('cricket-progress');
        var marksEl = document.getElementById('marks-running');
        if (progEl)  progEl.innerText  = cricketRounds.length + ' / ' + CRICKET_MAX_ROUNDS;
        if (marksEl) marksEl.innerText = getTotalMarks();
        if (roundsEl) roundsEl.innerText = cricketRounds.length;
        if (undoEl)   undoEl.innerHTML   = cricketRounds.length > 0 ? '<button onclick="undoLast()" class="stat-label" style="color:#6b6b6b">Undo</button>' : '';
        if (labelEl && valueEl) {
          if (!settings.zenMode) { labelEl.innerText='MPR'; valueEl.innerText=getCricketMPR(); valueEl.style.color='var(--accent)'; }
          else                   { labelEl.innerText='';    valueEl.innerText='\u2014';         valueEl.style.color='#222'; }
        }
      }
    }

    window.cycleMetric = function() { settings.zenMode = !settings.zenMode; saveSettings(); updateStats(); };

    /* ══════════════════════════════════════════
       CHARTS
    ══════════════════════════════════════════ */
    function accentHex() { return appMode === 'bull' ? '#f97316' : '#a855f7'; }
    function accentBg()  { return appMode === 'bull' ? 'rgba(249,115,22,0.12)' : 'rgba(168,85,247,0.12)'; }

    window.renderSessionChart = function() {
      var ctx = document.getElementById('sessionChart'); if (!ctx) return;
      var data = appMode === 'bull' ? rounds : cricketRounds;
      if (!data.length) return;
      var ac = accentHex(), abg = accentBg();
      var ymax = appMode === 'bull' ? 3 : (cricketTarget === 'BULL' ? 6 : 9);
      var trend = makeTrendDataset(data, ac);
      var ds = [{ data:data, borderColor:ac, backgroundColor:abg,
                  borderWidth:2, pointBackgroundColor:'#fff', pointRadius:3,
                  fill:true, tension:0.3, order:2 }];
      if (trend) ds.push(trend);
      var lbls = []; for (var i=0;i<data.length;i++) lbls.push(i+1);
      new Chart(ctx, { type:'line', data:{ labels:lbls, datasets:ds },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales:{ y:{min:0,max:ymax,ticks:{stepSize:1,color:'#3f3f3f'},grid:{color:'#151515'}},
                   x:{grid:{display:false},ticks:{color:'#3f3f3f',maxTicksLimit:10}} } } });
    };

    window.renderMacroChart = function() {
      var ctx = document.getElementById('macroChart'); if (!ctx) return;
      var src   = (appMode === 'bull' ? history : cricketHistory).slice().reverse();
      if (src.length < 2) return;
      var vals  = [];
      for (var i=0;i<src.length;i++) vals.push(parseFloat(appMode==='bull' ? src[i].bpr : src[i].mpr) || 0);
      var ac = accentHex(), abg = accentBg();
      var trend = makeTrendDataset(vals, ac);
      var ds = [{ data:vals, borderColor:ac, backgroundColor:abg,
                  borderWidth:2, pointBackgroundColor:'#fff', pointRadius:3,
                  fill:true, tension:0.3, order:2 }];
      if (trend) ds.push(trend);
      var lbls = []; for (var j=0;j<src.length;j++) lbls.push(j+1);
      new Chart(ctx, { type:'line', data:{ labels:lbls, datasets:ds },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales:{ y:{ticks:{color:'#3f3f3f'},grid:{color:'#151515'}},
                   x:{grid:{display:false},ticks:{color:'#3f3f3f',maxTicksLimit:8}} } } });
    };

    window.toggleMicroChart = function(index) {
      var container = document.getElementById('chart-container-' + index);
      container.classList.toggle('hidden');
      if (!container.classList.contains('hidden') && !Chart.getChart('microChart-' + index)) {
        var ctx  = document.getElementById('microChart-' + index);
        var h    = appMode === 'bull' ? history[index] : cricketHistory[index];
        var raw  = h.rawRounds || [];
        var ac   = accentHex(), abg = accentBg();
        var ymax = appMode === 'bull' ? 3 : (h.target === 'BULL' ? 6 : 9);
        var trend = makeTrendDataset(raw, ac);
        var ds = [{ data:raw, borderColor:ac, backgroundColor:abg,
                    borderWidth:2, pointBackgroundColor:'#fff', pointRadius:2,
                    fill:true, tension:0.3, order:2 }];
        if (trend) ds.push(trend);
        var lbls = []; for (var k=0;k<raw.length;k++) lbls.push(k+1);
        new Chart(ctx, { type:'line', data:{ labels:lbls, datasets:ds },
          options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
            scales:{ y:{min:0,max:ymax,ticks:{color:'#3f3f3f'},grid:{color:'#151515'}}, x:{display:false} } } });
      }
    };

            historyCards +=
              '<div class="insight-card">'
              + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:12px">'
              +   '<div class="stat-label">' + h.date + ' \u00b7 \u23f1 ' + (h.duration||'-') + metaSuffix + '</div>'
              +   '<button onclick="deleteRecord(' + idx + ')" class="stat-label" style="background:#181818;padding:3px 8px;border-radius:8px">&#x2715;</button>'
              + '</div>'
              + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:' + (appMode==='bull'?'12px':'0') + '">'
              +   '<div>'
              +     '<div class="score-display accent-text" style="font-size:2.6rem;line-height:1">' + (appMode==='bull'?(h.bpr||'0.00'):(h.mpr||'0.00')) + '<span class="stat-label" style="margin-left:4px">' + (appMode==='bull'?'BPR':'MPR') + '</span></div>'
              +     '<div class="stat-label" style="margin-top:4px">' + statLine + '</div>'
              +   '</div>'
              +   (hasRaw ? '<button onclick="toggleMicroChart(' + idx + ')" class="font-label" style="font-size:0.7rem;padding:8px 12px;border-radius:12px;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);letter-spacing:0.06em">\uD83D\uDCC8 Chart</button>' : '')
              + '</div>'
              + bullBreakdown
              + (hasRaw ? '<div id="chart-container-' + idx + '" class="hidden" style="height:120px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05)"><canvas id="microChart-' + idx + '"></canvas></div>' : '')
              + '</div>';
          }
        }

        var clearBtn = activeHistory.length > 0
          ? '<button onclick="clearHistory()" class="font-label" style="width:100%;padding:14px 0;font-size:0.85rem;color:#5a1a1a;margin-top:6px">Clear All History</button>'
          : '';

        appEl.innerHTML =
          '<div class="view-enter" style="display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid rgba(255,255,255,0.05)">'
          +   '<button onclick="toggleInsights()" class="accent-text font-label" style="font-size:0.9rem">&#8592; Back</button>'
          +   '<span class="font-label text-white" style="font-size:1.1rem">Insights</span>'
          +   '<div style="width:48px"></div>'
          + '</div>'
          + '<div style="padding:6px 0 4px;border-bottom:1px solid rgba(255,255,255,0.05)">' + headerToggleHTML() + '</div>'
          + '<div class="scrollable" style="flex:1;padding:14px 14px 40px;display:flex;flex-direction:column;gap:0">'
          +   profileCard + macroCard + historyCards + clearBtn
          + '</div>';

        setTimeout(window.renderMacroChart, 0);
      }
    }

    render();
  </script>
</body>
</html>
