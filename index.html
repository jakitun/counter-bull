<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Oche Tracker</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    touch-action: none;
    user-select: none;
    overflow: hidden;
    background: black;
    color: white;
  }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
</style>
</head>

<body class="bg-black text-white">

<div id="app" class="h-screen flex flex-col"></div>

<script>
/* =====================
   STATE
===================== */
let visits = [];
let bulls = 0;
let target = Number(localStorage.getItem('defaultTarget')) || 50;
let lastTap = 0;

const app = document.getElementById('app');

/* =====================
   AUDIO
===================== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, timeOffset = 0) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  osc.type = 'sine';
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const t = audioCtx.currentTime + timeOffset;
  osc.start(t);
  osc.stop(t + 0.08);
}

/* =====================
   HELPERS
===================== */
function bpv() {
  if (!visits.length) return 0;
  return (bulls / visits.length).toFixed(2);
}

function blankRate() {
  if (!visits.length) return 0;
  return ((visits.filter(v => v === 0).length / visits.length) * 100).toFixed(1);
}

function hatTricks() {
  return visits.filter(v => v === 3).length;
}

/* =====================
   PRACTICE VIEW
===================== */
function renderPractice() {
  app.innerHTML = `
  <div class="flex justify-between p-4 text-gray-400 text-sm">
    <button id="endBtn">End Session</button>
    <button id="insightsBtn">Insights</button>
  </div>

  <div class="flex-1 flex flex-col justify-center items-center">
    <div class="text-gray-500 mb-2">Bull/Target</div>
    <div class="text-[6rem] font-bold flex items-center">
      <span id="bulls">${bulls}</span> /
      <input id="targetInput" type="number" value="${target}"
        class="bg-transparent text-white w-[6rem] text-center outline-none" />
    </div>
  </div>

  <div class="flex justify-between px-6 text-sm text-gray-400 mb-2">
    <div>Visits ${visits.length}</div>
    <div>BPV ${bpv()}</div>
    <button id="undoBtn" class="text-gray-500">Undo</button>
  </div>

  <div class="flex-1 grid grid-cols-2 grid-rows-2 gap-4 p-4 pb-[env(safe-area-inset-bottom)]">
    ${[0,1,2,3].map(v => `
      <button data-val="${v}" 
      class="border border-white/20 rounded-xl h-full w-full flex items-center justify-center text-4xl">
        ${v}
      </button>
    `).join('')}
  </div>
  `;

  bindPractice();
}

function bindPractice() {

  document.getElementById('targetInput').addEventListener('change', e => {
    target = Number(e.target.value) || 50;
    localStorage.setItem('defaultTarget', target);
  });

  document.getElementById('endBtn').onclick = renderSummary;
  document.getElementById('insightsBtn').onclick = renderInsights;

  document.getElementById('undoBtn').onclick = () => {
    if (!visits.length) return;
    const last = visits.pop();
    bulls -= last;

    if (audioCtx.state === 'suspended') audioCtx.resume();
    beep(150);

    renderPractice();
  };

  document.querySelectorAll('[data-val]').forEach(btn => {
    btn.addEventListener('touchstart', e => {

      const now = Date.now();
      if (now - lastTap < 50) return;
      lastTap = now;

      if (audioCtx.state === 'suspended') audioCtx.resume();

      const val = Number(btn.dataset.val);

      // flash color
      const colors = ['bg-red-500','bg-green-500','bg-blue-500','bg-purple-500'];
      btn.classList.add(colors[val]);
      setTimeout(()=>btn.classList.remove(colors[val]),100);

      // audio
      if (val === 0) beep(200);
      if (val === 1) beep(300);
      if (val === 2) {
        beep(400,0);
        beep(400,0.15);
      }
      if (val === 3) {
        beep(500,0);
        beep(500,0.10);
        beep(500,0.20);
      }

      visits.push(val);
      bulls += val;

      if (bulls >= target) {
        renderSummary();
      } else {
        renderPractice();
      }

    }, { passive: true });
  });
}

/* =====================
   SUMMARY
===================== */
function renderSummary() {
  const date = new Date().toLocaleString();

  app.innerHTML = `
  <div class="p-6 flex flex-col h-full justify-center items-center text-center">
    <div class="text-xl mb-4">Session Summary</div>

    <div class="space-y-2 text-gray-300">
      <div>${date}</div>
      <div>Bulls: ${bulls}</div>
      <div>Visits: ${visits.length}</div>
      <div>BPV: ${bpv()}</div>
      <div>Blank Rate: ${blankRate()}%</div>
      <div>Hat Tricks: ${hatTricks()}</div>
    </div>

    <button id="restartBtn"
      class="mt-8 bg-white text-black px-6 py-4 rounded-xl text-lg">
      Restart Session
    </button>
  </div>
  `;

  document.getElementById('restartBtn').onclick = () => {
    saveSession();
    visits = [];
    bulls = 0;
    renderPractice();
  };
}

/* =====================
   INSIGHTS
===================== */
function renderInsights() {
  const data = JSON.parse(localStorage.getItem('sessions') || '[]');

  app.innerHTML = `
  <div class="flex justify-between p-4 text-gray-400 text-sm">
    <button id="backBtn">Back</button>
    <button id="clearBtn">Clear History</button>
  </div>

  <div class="flex-1 overflow-y-auto p-4 space-y-4">
    ${data.map(s => `
      <div class="border border-white/10 p-4 rounded-xl text-sm">
        <div>${s.date}</div>
        <div>Target: ${s.target}</div>
        <div>BPV: ${s.bpv}</div>
        <div>Blank: ${s.blank}%</div>
        <div>Hat Tricks: ${s.hat}</div>
      </div>
    `).join('') || '<div class="text-gray-500">No sessions</div>'}
  </div>
  `;

  document.body.style.overflow = "hidden";
  app.querySelector('.overflow-y-auto').style.overflowY = "auto";

  document.getElementById('backBtn').onclick = renderPractice;
  document.getElementById('clearBtn').onclick = () => {
    localStorage.removeItem('sessions');
    renderInsights();
  };
}

/* =====================
   STORAGE
===================== */
function saveSession() {
  const data = JSON.parse(localStorage.getItem('sessions') || '[]');

  data.unshift({
    date: new Date().toLocaleString(),
    target,
    bpv: bpv(),
    blank: blankRate(),
    hat: hatTricks()
  });

  localStorage.setItem('sessions', JSON.stringify(data));
}

/* =====================
   PWA
===================== */
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open('oche-cache').then(cache =>
          cache.addAll(['./'])
        )
      );
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;

  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl);
}

/* =====================
   INIT
===================== */
renderPractice();

</script>

</body>
</html>
