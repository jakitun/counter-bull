<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Oche Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --accent: #f97316; /* Bull Orange */
      --accent-dim: rgba(249, 115, 22, 0.15);
      --surface: #1e1e24;
    }
    body.mode-cricket {
      --accent: #a855f7; /* Cricket Purple */
      --accent-dim: rgba(168, 85, 247, 0.15);
    }
    html, body {
      height: 100%;
      overscroll-behavior: none;
      margin: 0;
      background: #09090b;
      color: white;
      touch-action: none;
      user-select: none;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
    }
    .font-display { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }
    
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"], input[type="text"] { background: transparent; outline: none; }
    
    .btn-target { 
      background: var(--surface); 
      transition: background-color 0.1s ease-out, transform 0.05s; 
      border: 1px solid rgba(255,255,255,0.05);
    } 
    .btn-target:active { transform: scale(0.96); }

    .flash-hit { background-color: var(--accent) !important; transition: none !important; color: white !important;} 
    .flash-miss { background-color: #ef4444 !important; transition: none !important; color: white !important;}
    
    .scrollable { touch-action: auto; overflow-y: auto; overscroll-behavior: auto; }
    
    /* Pop Animation for Hero Number */
    .score-pop { animation: pop 0.15s ease-out; }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  </style>
</head>
<body>
  <div id="app" class="h-full flex flex-col pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]"></div>

  <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex flex-col justify-end transition-opacity" onclick="toggleSettings()">
    <div class="bg-[#18181b] w-full rounded-t-3xl p-6 pb-12 border-t border-gray-800" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold font-display text-white tracking-wide">SETTINGS</h2>
        <button onclick="toggleSettings()" class="text-gray-400 font-bold text-xl p-2">&times;</button>
      </div>
      
      <div class="space-y-4 mb-8">
        <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-gray-800/50">
          <span class="text-lg font-semibold text-gray-300">Target Score (Bull)</span>
          <input type="number" id="setting-target" value="50" onchange="updateSettings('target', this.value)" class="w-16 text-right text-2xl font-bold text-white bg-transparent border-b border-gray-700 focus:border-[var(--accent)]" />
        </div>
        
        <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-gray-800/50">
          <span class="text-lg font-semibold text-gray-300">Audio Beeps</span>
          <button onclick="updateSettings('audio', !appSettings.audio)" id="toggle-audio" class="w-16 py-1 rounded font-bold text-sm ${appSettings.audio ? 'bg-[var(--accent)] text-white' : 'bg-gray-700 text-gray-400'}">ON</button>
        </div>

        <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-gray-800/50">
          <span class="text-lg font-semibold text-gray-300">Haptics (Android)</span>
          <button onclick="updateSettings('haptics', !appSettings.haptics)" id="toggle-haptics" class="w-16 py-1 rounded font-bold text-sm">ON</button>
        </div>

        <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-gray-800/50">
          <span class="text-lg font-semibold text-gray-300">Zen Mode (Hide Stats)</span>
          <button onclick="updateSettings('zen', !appSettings.zen)" id="toggle-zen" class="w-16 py-1 rounded font-bold text-sm">OFF</button>
        </div>
        
        <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-gray-800/50">
          <span class="text-lg font-semibold text-gray-300">Show Round Counter</span>
          <button onclick="updateSettings('showRounds', !appSettings.showRounds)" id="toggle-rounds" class="w-16 py-1 rounded font-bold text-sm">ON</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- GLOBAL STATE & CONFIG ---
    let appSettings = JSON.parse(localStorage.getItem('ocheSettings')) || {
      target: 50, audio: true, haptics: true, zen: false, showRounds: true, nickname: 'Player 1'
    };
    
    let currentView = 'practice';
    let appMode = localStorage.getItem('appMode') || 'bull'; // 'bull' or 'cricket'
    let lastTapTime = 0;
    let sessionStartTime = null; 
    let activeCharts = {}; // Registry to prevent Chart.js crashes

    // Bull Data
    let rounds = [];
    let history = JSON.parse(localStorage.getItem('ocheHistory')) || [];

    // Cricket Data
    let cricketTarget = localStorage.getItem('cricketTarget') || '20';
    let cricketRounds = [];
    let cricketHistory = JSON.parse(localStorage.getItem('ocheCricketHistory')) || [];

    // --- INITIALIZATION ---
    if(appMode === 'cricket') document.body.classList.add('mode-cricket');
    
    // --- AUDIO & HAPTICS ---
    let audioCtx;
    function initAudio() {
      if (!appSettings.audio) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    function triggerHaptic() {
      if (appSettings.haptics && navigator.vibrate) navigator.vibrate(40);
    }

    function beep(freq, delay = 0, duration = 0.1) {
      if (!appSettings.audio || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = audioCtx.currentTime + delay;
      osc.start(t);
      gain.gain.setValueAtTime(1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.stop(t + duration);
    }

    function playSound(marks) {
      if (marks === 0) beep(200);
      else if (marks === 1) beep(300);
      else if (marks === 2) { beep(400); beep(400, 0.15); }
      else if (marks === 3) { beep(500); beep(500, 0.10); beep(500, 0.20); }
      else if (marks <= 6) { beep(400); beep(500, 0.15); }
      else { beep(500); beep(600, 0.10); beep(700, 0.20); }
    }

    // --- MATH & STATS HELPERS ---
    const formatTime = (sec) => `${Math.floor(sec / 60)}m ${sec % 60}s`;
    
    // Logarithmic Regression: y = a + b*ln(x)
    function calcLogTrendline(dataArray) {
      const n = dataArray.length;
      if (n < 2) return dataArray;
      let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
      for (let i = 0; i < n; i++) {
        let x = Math.log(i + 1); // x must be > 0
        let y = parseFloat(dataArray[i]) || 0;
        sumX += x; sumY += y; sumXY += x * y; sumXX += x * x;
      }
      let b = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
      let a = (sumY - b * sumX) / n;
      return dataArray.map((_, i) => a + b * Math.log(i + 1));
    }

    function getAllTimeStats() {
      let totalBullRounds = 0, totalBulls = 0;
      history.forEach(h => { totalBullRounds += h.rounds; totalBulls += h.bulls; });
      
      let totalCricketRounds = 0, totalCricketMarks = 0;
      cricketHistory.forEach(h => { totalCricketRounds += 10; totalCricketMarks += h.totalMarks; });
      
      return {
        totalRounds: totalBullRounds + totalCricketRounds,
        allTimeBPR: totalBullRounds ? (totalBulls / totalBullRounds).toFixed(2) : '0.00',
        allTimeMPR: totalCricketRounds ? (totalCricketMarks / totalCricketRounds).toFixed(2) : '0.00'
      };
    }

    // --- SETTINGS & DATA SYNC ---
    window.toggleSettings = () => {
      const modal = document.getElementById('settings-modal');
      modal.classList.toggle('hidden');
      if (!modal.classList.contains('hidden')) syncSettingsUI();
    };

    function syncSettingsUI() {
      document.getElementById('setting-target').value = appSettings.target;
      const tAudio = document.getElementById('toggle-audio');
      tAudio.innerText = appSettings.audio ? 'ON' : 'OFF';
      tAudio.className = `w-16 py-1 rounded font-bold text-sm ${appSettings.audio ? 'bg-[var(--accent)] text-white' : 'bg-gray-700 text-gray-400'}`;
      
      const tHap = document.getElementById('toggle-haptics');
      tHap.innerText = appSettings.haptics ? 'ON' : 'OFF';
      tHap.className = `w-16 py-1 rounded font-bold text-sm ${appSettings.haptics ? 'bg-[var(--accent)] text-white' : 'bg-gray-700 text-gray-400'}`;
      
      const tZen = document.getElementById('toggle-zen');
      tZen.innerText = appSettings.zen ? 'ON' : 'OFF';
      tZen.className = `w-16 py-1 rounded font-bold text-sm ${appSettings.zen ? 'bg-[var(--accent)] text-white' : 'bg-gray-700 text-gray-400'}`;
      
      const tRounds = document.getElementById('toggle-rounds');
      tRounds.innerText = appSettings.showRounds ? 'ON' : 'OFF';
      tRounds.className = `w-16 py-1 rounded font-bold text-sm ${appSettings.showRounds ? 'bg-[var(--accent)] text-white' : 'bg-gray-700 text-gray-400'}`;
    }

    window.updateSettings = (key, val) => {
      if(key === 'target') val = parseInt(val) || 50;
      appSettings[key] = val;
      localStorage.setItem('ocheSettings', JSON.stringify(appSettings));
      syncSettingsUI();
      if(currentView === 'practice') updateStats();
    };

    window.updateNickname = (val) => {
      appSettings.nickname = val || 'Player 1';
      localStorage.setItem('ocheSettings', JSON.stringify(appSettings));
    };

    // --- EXPORT / IMPORT ---
    window.exportData = () => {
      const data = { bull: history, cricket: cricketHistory, settings: appSettings };
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
      const a = document.createElement('a');
      a.setAttribute("href", dataStr);
      a.setAttribute("download", `oche_backup_${new Date().toISOString().split('T')[0]}.json`);
      document.body.appendChild(a); a.click(); a.remove();
    };

    window.importData = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (imported.bull) localStorage.setItem('ocheHistory', JSON.stringify(imported.bull));
          if (imported.cricket) localStorage.setItem('ocheCricketHistory', JSON.stringify(imported.cricket));
          if (imported.settings) localStorage.setItem('ocheSettings', JSON.stringify(imported.settings));
          alert("Data restored successfully!");
          location.reload();
        } catch (err) { alert("Invalid backup file."); }
      };
      reader.readAsText(file);
    };

    // --- GAME LOGIC ---
    window.switchMode = (mode) => {
      if ((rounds.length > 0 || cricketRounds.length > 0) && !confirm('Discard current session?')) return;
      appMode = mode;
      localStorage.setItem('appMode', appMode);
      document.body.className = mode === 'cricket' ? 'mode-cricket' : '';
      restartSession();
    };

    window.changeCricketTarget = (val) => {
      if (cricketRounds.length > 0 && !confirm('Discard current session to change target?')) {
        document.getElementById('cricket-target-select').value = cricketTarget;
        return;
      }
      cricketTarget = val;
      localStorage.setItem('cricketTarget', val);
      restartSession();
    };

    const getBullTotal = () => rounds.reduce((a, b) => a + b, 0);
    const getCricketTotal = () => cricketRounds.reduce((a, b) => a + b, 0);

    window.tapButton = (val, btnElement) => {
      const now = Date.now();
      if (now - lastTapTime < 50) return; 
      lastTapTime = now;
      if (!sessionStartTime) sessionStartTime = Date.now();

      initAudio(); playSound(val); triggerHaptic();

      if (btnElement) {
        const flashClass = val === 0 ? 'flash-miss' : 'flash-hit';
        btnElement.classList.add(flashClass);
        setTimeout(() => btnElement.classList.remove(flashClass), 100);
      }

      // Pop Animation
      const hero = document.getElementById('hero-score');
      if (hero) {
        hero.classList.remove('score-pop');
        void hero.offsetWidth; // trigger reflow
        hero.classList.add('score-pop');
      }

      if (appMode === 'bull') {
        rounds.push(val);
        updateStats();
        if (getBullTotal() >= appSettings.target) setTimeout(endSession, 200);
      } else {
        cricketRounds.push(val);
        updateStats();
        if (cricketRounds.length >= 10) setTimeout(endSession, 200);
      }
    };

    window.undoLast = () => {
      initAudio(); beep(150); triggerHaptic();
      const arr = appMode === 'bull' ? rounds : cricketRounds;
      if (arr.length > 0) {
        arr.pop();
        if (arr.length === 0) sessionStartTime = null;
        updateStats();
      }
    };

    window.endSession = () => {
      const dur = sessionStartTime ? formatTime(Math.floor((Date.now() - sessionStartTime) / 1000)) : "0m 0s";
      const dateStr = new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

      if (appMode === 'bull' && rounds.length > 0) {
        history.unshift({
          date: dateStr, duration: dur, target: appSettings.target, 
          bulls: getBullTotal(), rounds: rounds.length, 
          bpr: (getBullTotal() / rounds.length).toFixed(2),
          c0: rounds.filter(v=>v===0).length, c1: rounds.filter(v=>v===1).length,
          c2: rounds.filter(v=>v===2).length, c3: rounds.filter(v=>v===3).length,
          rawRounds: [...rounds] 
        });
        localStorage.setItem('ocheHistory', JSON.stringify(history));
      } 
      else if (appMode === 'cricket' && cricketRounds.length > 0) {
        cricketHistory.unshift({
          date: dateStr, duration: dur, target: cricketTarget,
          totalMarks: getCricketTotal(), rounds: cricketRounds.length,
          mpr: (getCricketTotal() / cricketRounds.length).toFixed(2),
          rawRounds: [...cricketRounds]
        });
        localStorage.setItem('ocheCricketHistory', JSON.stringify(cricketHistory));
      }
      
      sessionStartTime = null; 
      currentView = 'summary';
      render();
    };

    window.restartSession = () => { rounds = []; cricketRounds = []; sessionStartTime = null; currentView = 'practice'; render(); };
    window.toggleView = (view) => { currentView = view; render(); };
    window.deleteRecord = (index) => {
      if (confirm('Delete session?')) {
        appMode === 'bull' ? history.splice(index, 1) : cricketHistory.splice(index, 1);
        localStorage.setItem(appMode === 'bull' ? 'ocheHistory' : 'ocheCricketHistory', JSON.stringify(appMode === 'bull' ? history : cricketHistory));
        render();
      }
    };
    window.clearHistory = () => {
      if (confirm(`Clear all ${appMode} history?`)) { 
        if (appMode === 'bull') { history = []; localStorage.removeItem('ocheHistory'); } 
        else { cricketHistory = []; localStorage.removeItem('ocheCricketHistory'); }
        render(); 
      }
    };

    // --- UI UPDATER ---
    function updateStats() {
      const isBull = appMode === 'bull';
      const arr = isBull ? rounds : cricketRounds;
      const total = isBull ? getBullTotal() : getCricketTotal();
      const avg = arr.length ? (total / arr.length).toFixed(2) : "0.00";

      const heroEl = document.getElementById('hero-score');
      const roundsEl = document.getElementById('rounds-display');
      const metricEl = document.getElementById('metric-display');
      const undoEl = document.getElementById('undo-btn');

      if (heroEl) heroEl.innerText = total;
      
      if (roundsEl) {
        if (appSettings.showRounds) {
          roundsEl.innerHTML = `Rounds <span class="text-white text-3xl ml-2 font-bold font-display">${arr.length}${isBull ? '' : '/10'}</span>`;
        } else {
          roundsEl.innerHTML = ``;
        }
      }
      
      if (metricEl) {
        if (appSettings.zen) {
          metricEl.innerHTML = `<span class="text-gray-600 text-3xl font-bold font-display">—</span>`;
        } else {
          metricEl.innerHTML = `<span class="text-gray-500 text-sm mb-1">${isBull ? 'BPR' : 'MPR'}</span> <span class="text-[var(--accent)] text-3xl ml-2 font-bold font-display">${avg}</span>`;
        }
      }

      if (undoEl) undoEl.style.display = arr.length > 0 ? 'block' : 'none';
    }

    // --- CHART ENGINE ---
    function drawChart(canvasId, dataArray, color) {
      if (activeCharts[canvasId]) activeCharts[canvasId].destroy();
      const ctx = document.getElementById(canvasId);
      if (!ctx || dataArray.length === 0) return;

      const labels = dataArray.map((_, i) => i + 1);
      const trendData = calcLogTrendline(dataArray);

      activeCharts[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Actual',
              data: dataArray,
              borderColor: color,
              backgroundColor: color.replace('1)', '0.1)'),
              borderWidth: 2,
              pointBackgroundColor: '#fff',
              pointRadius: 3,
              fill: true,
              tension: 0.2 
            },
            {
              label: 'Trend',
              data: trendData,
              borderColor: '#ffffff',
              borderWidth: 2,
              borderDash: [5, 5], // Dashed line for trend
              pointRadius: 0,
              fill: false,
              tension: 0.3
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: {
            y: { min: 0, ticks: { color: '#9ca3af' }, grid: { color: '#27272a' } },
            x: { display: false }
          }
        }
      });
    }

    window.toggleMicroChart = (index) => {
      const container = document.getElementById(`chart-container-${index}`);
      container.classList.toggle('hidden');
      if (!container.classList.contains('hidden')) {
        const h = appMode === 'bull' ? history[index] : cricketHistory[index];
        const color = appMode === 'bull' ? 'rgba(249, 115, 22, 1)' : 'rgba(168, 85, 247, 1)';
        setTimeout(() => drawChart(`microChart-${index}`, h.rawRounds, color), 10);
      }
    };

    // --- MAIN RENDERER ---
    const app = document.getElementById('app');
    
    function render() {
      const isBull = appMode === 'bull';
      const accentText = isBull ? 'text-orange-500' : 'text-purple-500';

      const headerToggle = `
        <div class="flex justify-center mt-2 mb-4 w-full px-6">
          <div class="bg-[#18181b] border border-gray-800 rounded-xl p-1 flex w-full max-w-sm justify-between shadow-lg">
            <button onclick="switchMode('bull')" class="${isBull ? 'bg-orange-500/20 text-orange-500' : 'text-gray-500'} w-1/2 py-2.5 rounded-lg text-sm font-bold tracking-wider transition-all">BULL RACE</button>
            <button onclick="switchMode('cricket')" class="${!isBull ? 'bg-purple-500/20 text-purple-500' : 'text-gray-500'} w-1/2 py-2.5 rounded-lg text-sm font-bold tracking-wider transition-all">CRICKET (LOCK)</button>
          </div>
        </div>
      `;

      if (currentView === 'practice') {
        const isBullStage = !isBull && cricketTarget === 'BULL';
        
        let padHtml = '';
        if (isBull) {
          padHtml = `
            <div class="flex-1 grid grid-cols-2 grid-rows-2 gap-4 px-4 pb-6 max-w-md w-full mx-auto">
              <button ontouchstart="tapButton(0, this)" onmousedown="tapButton(0, this)" class="btn-target rounded-3xl flex items-center justify-center text-[5rem] font-bold font-display text-gray-200">0</button>
              <button ontouchstart="tapButton(1, this)" onmousedown="tapButton(1, this)" class="btn-target rounded-3xl flex items-center justify-center text-[5rem] font-bold font-display text-gray-200">1</button>
              <button ontouchstart="tapButton(2, this)" onmousedown="tapButton(2, this)" class="btn-target rounded-3xl flex items-center justify-center text-[5rem] font-bold font-display text-gray-200">2</button>
              <button ontouchstart="tapButton(3, this)" onmousedown="tapButton(3, this)" class="btn-target rounded-3xl flex items-center justify-center text-[5rem] font-bold font-display text-gray-200">3</button>
            </div>`;
        } else {
          padHtml = `
            <div class="flex-1 grid grid-cols-3 grid-rows-4 gap-3 px-4 pb-6 max-w-md w-full mx-auto">
              ${[1,2,3,4,5,6].map(n => `<button ontouchstart="tapButton(${n}, this)" onmousedown="tapButton(${n}, this)" class="btn-target rounded-2xl flex items-center justify-center text-[3.5rem] font-bold font-display text-gray-200">${n}</button>`).join('')}
              ${[7,8,9].map(n => `<button ontouchstart="${isBullStage ? '' : `tapButton(${n}, this)`}" onmousedown="${isBullStage ? '' : `tapButton(${n}, this)`}" class="btn-target rounded-2xl flex items-center justify-center text-[3.5rem] font-bold font-display text-gray-200 transition-opacity ${isBullStage ? 'opacity-10' : ''}">${n}</button>`).join('')}
              <div></div>
              <button ontouchstart="tapButton(0, this)" onmousedown="tapButton(0, this)" class="btn-target rounded-2xl flex items-center justify-center text-[3.5rem] font-bold font-display text-gray-200">0</button>
              <div></div>
            </div>`;
        }

        app.innerHTML = `
          <div class="flex justify-between px-6 py-2 items-center text-gray-400 font-medium z-10">
            <button onclick="toggleSettings()" class="p-2 -ml-2 text-xl hover:text-white transition-colors">⚙️</button>
            <div class="space-x-4">
              <button onclick="endSession()" class="active:text-white uppercase text-sm tracking-widest font-bold">End</button>
              <button onclick="toggleView('insights')" class="active:text-white uppercase text-sm tracking-widest font-bold text-[var(--accent)]">Data</button>
            </div>
          </div>
          ${headerToggle}
          
          <div class="flex-none flex flex-col items-center justify-center py-2 h-44 relative">
            ${isBull ? `
              <div class="text-gray-500 text-sm mb-1 uppercase tracking-widest font-bold">Score / ${appSettings.target}</div>
              <div class="text-[clamp(4rem,18vw,7rem)] font-bold font-display leading-none text-white tracking-tight">
                <span id="hero-score" class="inline-block">0</span>
              </div>
            ` : `
              <div class="text-gray-500 text-sm mb-2 uppercase tracking-widest font-bold">Target Lock</div>
              <select id="cricket-target-select" onchange="changeCricketTarget(this.value)" class="bg-[#18181b] text-[var(--accent)] text-4xl font-display font-bold px-6 py-2 rounded-xl border border-gray-800 outline-none appearance-none text-center shadow-lg">
                ${['20','19','18','17','16','15','BULL'].map(t => `<option value="${t}" ${cricketTarget===t?'selected':''}>${t}</option>`).join('')}
              </select>
              <div class="text-white text-[clamp(3rem,12vw,5rem)] font-bold font-display leading-none mt-2">
                <span id="hero-score" class="inline-block">0</span>
              </div>
            `}
          </div>
          
          <div class="flex justify-between items-end px-6 pb-6 w-full max-w-md mx-auto">
            <div id="rounds-display" class="h-10 flex items-end text-gray-500 uppercase text-sm tracking-widest"></div>
            <div class="flex items-end gap-6 h-10">
              <button id="undo-btn" onclick="undoLast()" class="text-sm underline mb-1 text-gray-400 active:text-white" style="display:none">Undo</button>
              <div id="metric-display" class="flex items-end text-sm uppercase tracking-widest"></div>
            </div>
          </div>
          ${padHtml}
        `;
        updateStats();
      } 
      else if (currentView === 'summary') {
        app.innerHTML = `
          <div class="flex-1 scrollable flex flex-col items-center p-8 text-center">
            <h1 class="text-4xl font-bold font-display tracking-wide mb-2 text-white">SESSION COMPLETE</h1>
            <div class="text-gray-400 mb-8 font-semibold bg-[#18181b] border border-gray-800 px-4 py-1.5 rounded-full text-sm">⏱️ ${sessionStartTime ? formatTime(Math.floor((Date.now() - sessionStartTime) / 1000)) : (isBull ? history[0]?.duration : cricketHistory[0]?.duration)}</div>
            
            <div class="bg-[#18181b] border border-gray-800 w-full max-w-sm rounded-2xl p-6 mb-6 shadow-xl">
              ${isBull ? `
                <div class="flex justify-between border-b border-gray-800/50 py-3"><span class="text-gray-400">Bulls:</span> <span class="text-white font-bold text-xl font-display">${getBullTotal()} / ${appSettings.target}</span></div>
                <div class="flex justify-between border-b border-gray-800/50 py-3"><span class="text-gray-400">Rounds:</span> <span class="text-white font-bold text-xl font-display">${rounds.length}</span></div>
                <div class="flex justify-between py-3"><span class="text-gray-400">BPR:</span> <span class="text-[var(--accent)] font-bold text-2xl font-display">${(getBullTotal()/rounds.length).toFixed(2)}</span></div>
              ` : `
                <div class="flex justify-between border-b border-gray-800/50 py-3"><span class="text-gray-400">Target:</span> <span class="text-[var(--accent)] font-bold text-xl font-display">${cricketTarget}</span></div>
                <div class="flex justify-between border-b border-gray-800/50 py-3"><span class="text-gray-400">Total Marks:</span> <span class="text-white font-bold text-xl font-display">${getCricketTotal()}</span></div>
                <div class="flex justify-between py-3"><span class="text-gray-400">MPR:</span> <span class="text-[var(--accent)] font-bold text-2xl font-display">${(getCricketTotal()/10).toFixed(2)}</span></div>
              `}
            </div>

            <div class="w-full max-w-sm h-48 mb-8 bg-[#18181b] p-4 rounded-2xl border border-gray-800 shadow-lg">
              <canvas id="sessionChart"></canvas>
            </div>

            <button onclick="restartSession()" class="w-full max-w-sm bg-white text-black font-bold font-display py-4 rounded-xl text-2xl active:bg-gray-300 transition-colors">CONTINUE DRILL</button>
          </div>
        `;
        const arr = isBull ? rounds : cricketRounds;
        const color = isBull ? 'rgba(249, 115, 22, 1)' : 'rgba(168, 85, 247, 1)';
        setTimeout(() => drawChart('sessionChart', arr, color), 50);
      } 
      else if (currentView === 'insights') {
        const stats = getAllTimeStats();
        const activeHistory = isBull ? history : cricketHistory;
        
        app.innerHTML = `
          <div class="flex justify-between items-center px-6 py-4 z-10 border-b border-gray-800 bg-[#09090b]">
            <button onclick="toggleView('practice')" class="${accentText} font-bold tracking-wider text-sm">&larr; BACK TO OCHE</button>
            <span class="font-bold text-xl font-display text-white tracking-widest">PROFILE</span>
            <div class="w-16"></div>
          </div>
          
          <div class="flex-1 scrollable px-4 pb-12 pt-6">
            <div class="bg-[#18181b] rounded-3xl p-6 mb-6 border border-gray-800 shadow-xl">
              <div class="flex justify-between items-center border-b border-gray-800/50 pb-4 mb-4">
                <input type="text" value="${appSettings.nickname}" onchange="updateNickname(this.value)" class="text-3xl font-bold font-display text-white bg-transparent w-48 focus:border-b focus:border-gray-600" placeholder="Your Name" />
                <span class="text-xs text-gray-500 uppercase tracking-widest font-bold">Tap to edit</span>
              </div>
              <div class="grid grid-cols-3 gap-4 text-center mb-6">
                <div><div class="text-gray-500 text-xs uppercase font-bold tracking-wider mb-1">ALL BPR</div><div class="text-orange-500 text-3xl font-display font-bold">${stats.allTimeBPR}</div></div>
                <div class="border-l border-r border-gray-800/50"><div class="text-gray-500 text-xs uppercase font-bold tracking-wider mb-1">ALL MPR</div><div class="text-purple-500 text-3xl font-display font-bold">${stats.allTimeMPR}</div></div>
                <div><div class="text-gray-500 text-xs uppercase font-bold tracking-wider mb-1">ROUNDS</div><div class="text-white text-3xl font-display font-bold">${stats.totalRounds}</div></div>
              </div>
              
              <div class="w-full h-32 mb-6">
                 ${activeHistory.length > 1 ? '<canvas id="macroChart"></canvas>' : '<div class="h-full flex items-center justify-center text-gray-600 text-sm font-bold">Play 2 sessions to see trend graph.</div>'}
              </div>

              <div class="flex gap-2">
                <button onclick="exportData()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors border border-gray-700">💾 Backup</button>
                <label class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-2.5 rounded-lg text-sm text-center cursor-pointer transition-colors border border-gray-700">
                  📂 Restore <input type="file" accept=".json" onchange="importData(event)" class="hidden" />
                </label>
              </div>
            </div>

            ${headerToggle}

            <div class="space-y-4 mt-2">
              ${activeHistory.length === 0 ? '<div class="text-center text-gray-600 font-bold mt-8">No sessions recorded yet.</div>' :
                activeHistory.map((h, i) => `
                  <div class="bg-[#18181b] rounded-2xl p-5 border border-gray-800 shadow-lg">
                    <div class="flex justify-between items-start border-b border-gray-800/50 pb-3 mb-3">
                      <div class="text-xs text-gray-500 font-bold tracking-wider uppercase">${h.date} &nbsp;|&nbsp; ⏱️ ${h.duration || '-'}</div>
                      <button onclick="deleteRecord(${i})" class="text-red-900 font-bold active:text-red-500 px-2 bg-black rounded">X</button>
                    </div>
                    <div class="flex justify-between items-center">
                      <div>
                        <div class="text-4xl font-bold font-display ${accentText}">${isBull ? h.bpr : h.mpr} <span class="text-sm font-sans text-gray-500 tracking-widest">${isBull ? 'BPR' : 'MPR'}</span></div>
                        <div class="text-sm text-gray-400 font-bold mt-1">${isBull ? `${h.bulls}/${h.target} Bulls in ${h.rounds} rds` : `Target: ${h.target} | ${h.totalMarks} Marks`}</div>
                      </div>
                      ${h.rawRounds ? `<button onclick="toggleMicroChart(${i})" class="${accentText} text-xs font-bold uppercase tracking-widest bg-black px-3 py-2 rounded-lg border border-gray-800 active:bg-gray-900">Graph</button>` : ''}
                    </div>
                    ${h.rawRounds ? `<div id="chart-container-${i}" class="hidden w-full h-32 mt-4 pt-4 border-t border-gray-800/50"><canvas id="microChart-${i}"></canvas></div>` : ''}
                  </div>
                `).join('')
              }
              ${activeHistory.length > 0 ? `<button onclick="clearHistory()" class="w-full mt-6 py-4 text-red-900 font-bold uppercase tracking-widest text-sm active:text-red-500">Clear All History</button>` : ''}
            </div>
          </div>
        `;

        // Render Macro Chart
        if (activeHistory.length > 1) {
          const dataArray = [...activeHistory].reverse().map(h => parseFloat(isBull ? h.bpr : h.mpr));
          const color = isBull ? 'rgba(249, 115, 22, 1)' : 'rgba(168, 85, 247, 1)';
          setTimeout(() => drawChart('macroChart', dataArray, color), 50);
        }
      }
    }

    render();
  </script>
</body>
</html>
